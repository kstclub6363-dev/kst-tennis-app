      const [selectedMonth, setSelectedMonth] = useState(null); // '4月' 等
      const [detailEvents, setDetailEvents] = useState(null); // クリックした日の予定一覧（モーダル表示用）

      useEffect(() => {
        const unsub = db.collection('publicCalendars').doc(teamName).onSnapshot(
          doc => { setData(doc.exists ? doc.data() : null); setLoadError(null); },
          err => { console.error('公開カレンダー読み込みエラー', err); setData(null); setLoadError((err && err.code) || 'unknown'); }
        );
        return unsub;
      }, [teamName]);

      if (data === undefined) {
        return <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white"><div className="loader mb-4"></div></div>;
      }
      if (!data) {
        return (
          <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white p-4 text-center gap-2">
            <p className="font-bold text-sm">このチームの公開カレンダーはまだ準備されていません。</p>
            {loadError === 'permission-denied' ? (
              <p className="text-xs text-amber-400 max-w-sm">権限エラーが発生しています。Firestoreのセキュリティルールに publicCalendars の読み取り許可（allow read: if true;）が反映されているか確認してください。</p>
            ) : (
              <p className="text-xs text-slate-400 max-w-sm">このチームでまだ一度も大会情報が保存されていない可能性があります。アプリ側で一度大会情報を編集・保存すると、このページにも表示されるようになります。</p>
            )}
          </div>
        );
      }

      const year = data.year || String(new Date().getFullYear());
      const tournamentsByBucket = data.tournaments || {};
      const buckets = BUCKETS.filter(b => (tournamentsByBucket[b] || []).filter(t => t.parentVisible !== false).length);
      const activeBucket = (selectedBucket && buckets.includes(selectedBucket)) ? selectedBucket : (buckets[0] || null);

      const parsePublicDate = (t) => {
        const m1 = String(t.month || '').match(/(\d{1,2})\s*月/);
        const d1 = String(t.date || '').match(/(\d{1,2})\s*[\/月]\s*(\d{1,2})?/);
        const m = d1 && d1[2] ? Number(d1[1]) : (m1 ? Number(m1[1]) : null);
        const d = d1 && d1[2] ? Number(d1[2]) : (d1 ? Number(d1[1]) : null);
        if (!m || !d) return null;
        const y = m >= 4 ? Number(year) : Number(year) + 1;
        const dt = new Date(y, m - 1, d);
        return Number.isNaN(dt.getTime()) ? null : dt;
      };

      const bucketEvents = activeBucket ? (tournamentsByBucket[activeBucket] || []).filter(t => t.parentVisible !== false) : [];
      const datedEvents = bucketEvents.map(t => ({ ...t, parsedDate: parsePublicDate(t) })).filter(e => e.parsedDate);
      const undatedEvents = bucketEvents.filter(t => !parsePublicDate(t));

      const today = new Date(); today.setHours(0,0,0,0);
      const upcoming = datedEvents.filter(e => e.parsedDate >= today).sort((a,b)=>a.parsedDate-b.parsedDate);
      const nextEvent = upcoming[0] || null;
      const daysToNext = nextEvent ? Math.ceil((nextEvent.parsedDate - today) / 86400000) : null;

      const activeMonth = (selectedMonth && PUBLIC_MONTH_LABELS.includes(selectedMonth))
        ? selectedMonth
        : (nextEvent ? PUBLIC_MONTH_LABELS.find(l => l.replace('月','') === String(nextEvent.parsedDate.getMonth() + 1)) : '4月');

      const monthNum = Number(activeMonth.replace('月',''));
      const gridYear = monthNum >= 4 ? Number(year) : Number(year) + 1;
      const firstOfMonth = new Date(gridYear, monthNum - 1, 1);
      const daysInMonth = new Date(gridYear, monthNum, 0).getDate();
      const leadingBlanks = firstOfMonth.getDay(); // 0=日曜
      const cells = [];
      for (let i = 0; i < leadingBlanks; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      const eventsOnDay = (day) => datedEvents.filter(e => e.parsedDate.getFullYear() === gridYear && e.parsedDate.getMonth() === monthNum - 1 && e.parsedDate.getDate() === day);
      const theme = PUBLIC_BUCKET_THEME[activeBucket] || PUBLIC_BUCKET_THEME['共通'];
      const weekDayLabels = ['日','月','火','水','木','金','土'];
      const publicInfo = data.publicInfo || {};
      const seasonResults = bucketEvents.filter(t => t.result);

      return (
        <div className="min-h-screen bg-gray-100">
          <div className="bg-slate-900 text-white py-5 px-4 text-center">
            <span className="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase">KST SYSTEM</span>
            <h1 className="text-xl font-black mt-2">{teamName} 大会カレンダー</h1>
            <p className="text-[11px] text-slate-400 mt-1">保護者向け公開ページ（閲覧専用・育成計画等の内部情報は含みません）</p>
          </div>

          <div className="max-w-3xl mx-auto p-4 space-y-4">
            {publicInfo.greeting && (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
                <div className="text-[11px] font-black text-gray-400 mb-1"><i className="fas fa-comment-dots mr-1.5"></i>ごあいさつ</div>
                <p className="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">{publicInfo.greeting}</p>
              </div>
            )}
            {buckets.length === 0 && <p className="text-center text-gray-400 text-sm py-10">まだ大会情報が登録されていません。</p>}

            {buckets.length > 0 && (
              <div className="flex gap-2 justify-center">
                {buckets.map(b => {
                  const bt = PUBLIC_BUCKET_THEME[b] || PUBLIC_BUCKET_THEME['共通'];
                  const active = b === activeBucket;
                  return (
                    <button key={b} onClick={() => setSelectedBucket(b)} className={`px-4 py-2 rounded-full text-sm font-black border-2 transition-all ${active ? `${bt.bg} text-white border-transparent shadow-md` : 'bg-white text-gray-400 border-gray-200'}`}>
                      {b === '男子' && <i className="fas fa-mars mr-1"></i>}{b === '女子' && <i className="fas fa-venus mr-1"></i>}{b === '共通' && <i className="fas fa-users mr-1"></i>}
                      {b === '共通' ? 'チーム共通' : b}
                    </button>
                  );
                })}
              </div>
            )}

            {activeBucket && (
              <>
                {nextEvent && (
                  <div className={`rounded-2xl p-5 text-white shadow-lg bg-gradient-to-br ${activeBucket === '女子' ? 'from-pink-500 to-pink-700' : activeBucket === '共通' ? 'from-emerald-600 to-teal-800' : 'from-blue-600 to-blue-800'}`}>
                    <div className="text-[11px] font-black opacity-80 mb-1"><i className="fas fa-forward mr-1.5"></i>次回の予定</div>
                    <div className="text-3xl font-black">あと{daysToNext}日</div>
                    <div className="text-lg font-black mt-1">{nextEvent.name}</div>
                    <div className="text-xs opacity-90 mt-1">{nextEvent.month} {nextEvent.date} / {nextEvent.place || '場所未入力'}</div>
                    <button onClick={() => { setSelectedMonth(activeMonth); setDetailEvents([nextEvent]); }} className="mt-3 bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-1.5 rounded-lg">詳細を見る</button>
                  </div>
                )}

                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
                  <div className="flex items-center justify-between mb-3">
                    <button onClick={() => { const idx = PUBLIC_MONTH_LABELS.indexOf(activeMonth); setSelectedMonth(PUBLIC_MONTH_LABELS[(idx - 1 + 12) % 12]); }} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold"><i className="fas fa-chevron-left"></i></button>
                    <span className="font-black text-gray-800 text-lg">{gridYear}年 {activeMonth}</span>
                    <button onClick={() => { const idx = PUBLIC_MONTH_LABELS.indexOf(activeMonth); setSelectedMonth(PUBLIC_MONTH_LABELS[(idx + 1) % 12]); }} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold"><i className="fas fa-chevron-right"></i></button>
                  </div>
                  <div className="flex overflow-x-auto gap-1.5 mb-3 pb-1">
                    {PUBLIC_MONTH_LABELS.map(l => (
                      <button key={l} onClick={() => setSelectedMonth(l)} className={`shrink-0 px-2.5 py-1 rounded-full text-[11px] font-bold ${l === activeMonth ? `${theme.bg} text-white` : 'bg-gray-100 text-gray-400'}`}>{l}</button>
                    ))}
                  </div>
                  <div className="grid grid-cols-7 gap-1 text-center">
                    {weekDayLabels.map(w => <div key={w} className="text-[10px] font-bold text-gray-400 py-1">{w}</div>)}
                    {cells.map((day, i) => {
                      if (day === null) return <div key={i}></div>;
                      const evs = eventsOnDay(day);
                      const isToday = gridYear === today.getFullYear() && monthNum - 1 === today.getMonth() && day === today.getDate();
                      const cellColorClass = evs.length === 1
                        ? `${eventTypeCellClass(evs[0].eventType, evs[0].org)} border cursor-pointer`
                        : evs.length > 1 ? `${theme.light} ${theme.text} border ${theme.border} cursor-pointer` : 'text-gray-400';
                      return (
                        <button
                          key={i}
                          onClick={() => evs.length && setDetailEvents(evs)}
                          className={`aspect-square rounded-lg flex flex-col items-center justify-center text-xs font-bold relative ${cellColorClass} ${isToday ? 'ring-2 ring-amber-400' : ''}`}
                        >
                          {day}
                          {evs.length > 0 && (
                            <span className="flex gap-0.5 mt-0.5">
                              {evs.slice(0, 3).map((e, di) => <span key={di} className={`w-1.5 h-1.5 rounded-full ${eventTypeDotClass(e.eventType, e.org)} ${e.org === '地域クラブ' ? 'ring-1 ring-teal-700' : ''}`}></span>)}
                            </span>
                          )}
                        </button>
                      );
                    })}
                  </div>
                  <div className="flex flex-wrap gap-x-3 gap-y-1.5 mt-3 pt-2 border-t border-gray-100">
                    {EVENT_TYPES.map(et => (
                      <span key={et} className="flex items-center gap-1 text-[10px] font-bold text-gray-500"><span className={`w-2 h-2 rounded-full ${eventTypeDotClass(et)}`}></span>{et}</span>
                    ))}
                    <span className="flex items-center gap-1 text-[10px] font-bold text-teal-600"><span className="w-2 h-2 rounded-full bg-gray-300 ring-1 ring-teal-700"></span>地域クラブ主催</span>
                  </div>
                </div>

                {undatedEvents.length > 0 && (
                  <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
                    <div className="text-xs font-black text-gray-500 mb-2"><i className="fas fa-question-circle mr-1"></i>日程未定の予定</div>
                    <div className="divide-y divide-gray-100">
                      {undatedEvents.map((t, i) => (
                        <button key={i} onClick={() => setDetailEvents([t])} className="w-full text-left py-2 flex items-center justify-between gap-2">
                          <span className="font-bold text-gray-700 text-sm">{t.name}</span>
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded border ${eventTypeChipClass(t.eventType, t.org)}`}>{t.eventType || '大会'}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {seasonResults.length > 0 && (
                  <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
                    <div className="text-xs font-black text-gray-500 mb-3"><i className="fas fa-trophy text-amber-500 mr-1.5"></i>今シーズンの成績（{seasonResults.length}件）</div>
                    <div className="divide-y divide-gray-100">
                      {seasonResults.map((t, i) => (
                        <button key={i} onClick={() => setDetailEvents([t])} className="w-full text-left py-2.5 flex flex-col gap-0.5">
                          <div className="flex justify-between items-baseline gap-2">
                            <span className="font-bold text-gray-800 text-sm truncate">{t.name}</span>
                            <span className="text-[10px] text-gray-400 whitespace-nowrap">{t.month} {t.date && t.date !== '日程確定後記入' ? t.date : ''}</span>
                          </div>
                          <span className="text-emerald-600 text-xs font-bold">{t.result}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}

            {(publicInfo.faq || []).length > 0 && (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
                <div className="text-xs font-black text-gray-500 mb-3"><i className="fas fa-circle-question text-blue-500 mr-1.5"></i>よくある質問</div>
                <div className="divide-y divide-gray-100">
                  {publicInfo.faq.map((item, i) => (
                    <details key={item.id || i} className="py-2.5">
                      <summary className="font-bold text-gray-800 text-sm cursor-pointer">{item.q || '（質問未入力）'}</summary>
                      <p className="text-xs text-gray-600 mt-2 whitespace-pre-wrap leading-relaxed">{item.a || '（回答未入力）'}</p>
                    </details>
                  ))}
                </div>
              </div>
            )}

            {publicInfo.contact && (
              <div className="text-center text-xs text-gray-400 font-bold py-2">
                <i className="fas fa-envelope mr-1.5"></i>{publicInfo.contact}
              </div>
            )}
          </div>

          {detailEvents && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onClick={() => setDetailEvents(null)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-4 space-y-4">
                  <div className="flex justify-between items-center">
                    <span className="text-xs font-black text-gray-400">予定の詳細</span>
                    <button onClick={() => setDetailEvents(null)} className="text-gray-400 hover:text-gray-600 text-lg"><i className="fas fa-times"></i></button>
                  </div>
                  {detailEvents.map((t, i) => (
                    <div key={i} className={i > 0 ? 'pt-4 border-t border-gray-100' : ''}>
                      <span className={`text-[10px] font-bold px-2 py-0.5 rounded border ${eventTypeChipClass(t.eventType, t.org)}`}>{t.eventType || '大会'}</span>
                      {t.org === '地域クラブ' && <span className="text-[10px] font-bold px-2 py-0.5 rounded border bg-teal-50 text-teal-700 border-teal-200 ml-1.5">地域クラブ主催</span>}
                      <div className="text-lg font-black text-gray-800 mt-1.5">{t.name}</div>
                      <div className="text-xs text-gray-400 font-bold mt-0.5">{t.month} {t.date && t.date !== '日程確定後記入' ? t.date : '（日程未定）'} {t.category && `/ ${t.category}`}</div>
                      {(t.place || t.meeting) && (
                        <div className="bg-gray-50 rounded-lg p-3 mt-2 text-sm space-y-1">
                          {t.place && <div><span className="font-bold text-gray-500">場所：</span>{t.place}</div>}
                          {t.meeting && <div><span className="font-bold text-gray-500">集合：</span>{t.meeting}</div>}
                        </div>
                      )}
                      {t.belongings && <div className="text-sm mt-2"><span className="font-bold text-gray-500">持ち物：</span>{t.belongings}</div>}
                      {t.notice && <div className="text-sm mt-2 bg-amber-50 border border-amber-100 rounded-lg p-3 whitespace-pre-wrap">{t.notice}</div>}
                      {t.photoUrl && <img src={t.photoUrl} alt="" className="w-full max-h-64 object-cover rounded-lg mt-2 border border-gray-200"/>}
                      {t.result && <div className="text-emerald-700 font-bold mt-2 bg-emerald-50 border border-emerald-100 rounded-lg p-3"><i className="fas fa-trophy mr-1.5"></i>{t.result}</div>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const Root = () => {
      const publicParams = new URLSearchParams(window.location.search);
      if (publicParams.get('public') === '1' && publicParams.get('team')) {
        return <PublicCalendarView teamName={publicParams.get('team')} />;
      }

      const [authUser, setAuthUser] = useState(undefined); // undefined=判定中, null=未ログイン
      const [profile, setProfile] = useState(null);
      const [route, setRoute] = useState('app');
      const [forcedOut, setForcedOut] = useState('');

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
          setAuthUser(u || null);
          if (!u) setProfile(null);
        });
        return unsub;
      }, []);

      useEffect(() => {
        if (!authUser) return;
        const unsub = db.collection('users').doc(authUser.uid).onSnapshot(doc => {
          if (!doc.exists) { setProfile(null); return; }
          const data = doc.data();
          if (data.active === false) {
            setForcedOut('このアカウントは管理者によって無効化されました。');
            auth.signOut();
            return;
          }
          setProfile({ id: doc.id, ...data });
        });
        return unsub;
      }, [authUser]);

      if (authUser === undefined) {
        return <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white"><div className="loader mb-4"></div></div>;
      }

      if (!authUser) {
        return (
          <div>
            {forcedOut && <div className="bg-rose-600 text-white text-xs font-bold text-center py-2">{forcedOut}</div>}
            <LoginScreen />
          </div>
        );
      }

      if (!profile) {
        return (
          <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white gap-4 p-4 text-center">
            <p className="font-bold text-sm">アカウント情報が見つかりません。管理者にアカウント発行を依頼してください。</p>
            <button onClick={() => auth.signOut()} className="bg-slate-700 hover:bg-slate-600 text-xs font-bold px-4 py-2 rounded">ログアウト</button>
          </div>
        );
      }

      if (route === 'admin' && normalizeRole(profile.role) === 'admin') {
        return <AdminPage profile={profile} onBack={() => setRoute('app')} />;
      }

      return <TrainingApp profile={profile} onGoAdmin={() => setRoute('admin')} onLogout={() => auth.signOut()} />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
  </script>
</body>
</html>
