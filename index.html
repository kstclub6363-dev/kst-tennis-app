      'I': { position: '冬季強化期間の成果を確認する中間実戦評価。フォーム改善・体力強化の成果を試す。', back: '冬季に取り組んだフォーム改善の実戦での再現。\nALL DAY MATCHでの長時間試合を通じた戦術持続力。', front: '1日複数試合をこなす中での判断の安定性。', team: '春大会シーズンへの意欲づけ。\n長時間の試合でも崩れないメンタル、運営を通じた責任感。', level: 'フォーム改善の定着度チェック。\n体力面での春季大会に向けた課題確認。' },
      'J': { position: '年度の集大成大会。1年間の成長を確認し新年度・新入部員へ引き継ぐ「送り出しの評価日」。', back: '1年間で身につけた技術の完成度確認。\nチーム・個人としての戦術の総仕上げ。', front: '1年間で培った判断力を大舞台で発揮する。', team: '3年生は最後の締めくくり、下級生は次年度主力としての自覚。\n感謝・引き継ぎの姿勢。', level: '1年間を通じた成長の総括。\n次年度に引き継ぐ課題の明文化。' },
      '共通': { position: '直近の大会や課題に応じて柔軟に組み込む実戦の調整弁。', back: '直近の大会で出た技術課題を試す場。', front: '直近の大会で出た戦術課題を試す場。', team: '実戦の場数を増やし判断力を鍛える。\n対戦相手との交流を通じた礼儀・関係づくり。', level: 'その時点の重点課題の改善度チェック。\n次に控える公式戦のテーマに直結させる。' }
    };

    const uid = (() => { let n = 0; return (prefix) => `${prefix}_${Date.now()}_${(n++)}_${Math.random().toString(36).slice(2,7)}`; })();

    const buildInitialPractices = () => {
      const p = {};
      GROUPS.forEach(g => {
        p[g.id] = [
          { id: uid('pr'), week: '第1週', theme: '基本フォーム・基本連携の徹底', drill: '手投げ一本打ち、サーブ・レシーブ基礎確認、前後陣の役割整理' },
          { id: uid('pr'), week: '第2週', theme: '精度とスピードの両立', drill: 'スマッシュ・ボレー強化、対戦相手を想定した戦術練習' },
          { id: uid('pr'), week: '第3週', theme: '実戦耐性の強化・ペア意思統一', drill: '実戦形式練習の比率向上、格上・格下想定のゲーム練習' },
          { id: uid('pr'), week: '第4週', theme: 'プレッシャー下での冷静な判断', drill: 'タイブレーク想定練習、チームの勝ちパターン確認、応援徹底' }
        ];
      });
      return p;
    };

    const buildInitialReflections = () => {
      const r = {};
      GROUPS.forEach(g => { r[g.id] = { completed: false, good: '', bad: '', nextAction: '', comments: [] }; });
      return r;
    };

    const buildInitialPlansWithComments = () => {
      const p = JSON.parse(JSON.stringify(initialPlans));
      GROUPS.forEach(g => { p[g.id].comments = []; });
      return p;
    };

    // 1つのバケツ（男子 / 女子 / 共通）分のテンプレートを作る
    const buildBucketTemplate = (labelPrefix) => ({
      activeGroup: 'A', // このチーム・このバケツの「現在の進行フェーズ」（チーム/男女ごとに独立して保持する）
      tournaments: initialTournaments.map(t => ({
        ...t,
        group: t.id, // A〜J/共通の所属グループ。idとは分けて保持する
        id: uid('t'),
        result: '', // 大会結果（順位・戦績・メモ）
        name: (labelPrefix && t.name.includes('大会')) ? `${labelPrefix} ${t.name}` : t.name
      })),
      plans: buildInitialPlansWithComments(),
      practices: buildInitialPractices(),
      reflections: buildInitialReflections(),
      roster: [], // 選手名簿
      sessions: [], // 出欠記録（練習日ごとの出席チェック）
      reviewFlags: {} // グループごとの「育成計画が変わったので見直してね」フラグ {[groupId]: {practice:bool, reflection:bool}}
    });

    // 以前のバージョンで作られたデータには roster/sessions/result/comments が無いことがあるため、
    // 読み込み時に不足分を安全に補完する（データ移行なしで新機能を使えるようにするため）
    const normalizeBucketData = (data) => {
      if (!data) return data;
      const tournaments = (data.tournaments || []).map(t => ({ result: '', ...t, group: inferTournamentGroup(t), id: (t.id && !isGroupId(t.id)) ? t.id : uid('t') }));
      const plans = {};
      GROUPS.forEach(g => {
        const p = (data.plans && data.plans[g.id]) || initialPlans[g.id] || {};
        plans[g.id] = { position: '', back: '', front: '', team: '', level: '', comments: [], ...p, comments: (p.comments || []) };
      });
      const reflections = {};
      GROUPS.forEach(g => {
        const r = (data.reflections && data.reflections[g.id]) || {};
        reflections[g.id] = { completed: false, good: '', bad: '', nextAction: '', ...r, comments: (r.comments || []) };
      });
      return {
        activeGroup: data.activeGroup || 'A',
        tournaments,
        plans,
        practices: data.practices || buildInitialPractices(),
        reflections,
        roster: data.roster || [],
        sessions: data.sessions || [],
        reviewFlags: data.reviewFlags || {}
      };
    };

    // 1年度分のデータ（男子・女子・共通の3バケツ）を新規生成
    const generateYearData = () => {
      const male = buildBucketTemplate('男子');
      const female = buildBucketTemplate('女子');
      // 共通はチーム全体の行事のみを初期値として残す（KST/KSC主催などクラブ単位の行事）
      const common = buildBucketTemplate(null);
      common.tournaments = common.tournaments.filter(t => /KST|KSC/.test(t.name));
      // groupSettings は年度ごとに保持する（年度を変えても別年度のグループ名が変わらないようにする）
      return { '男子': male, '女子': female, '共通': common, groupSettings: {} };
    };

    const initialGlobalStore = {
      "西ノ京中学校": { "2026": generateYearData() }
    };

    const downloadBlob = (filename, content, type) => {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    };

    // ================= ログイン画面 =================
    const LoginScreen = () => {
      const [mode, setMode] = useState('login'); // 'login' | 'bootstrap'
      const [checkingBootstrap, setCheckingBootstrap] = useState(true);
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [busy, setBusy] = useState(false);

      useEffect(() => {
        db.collection('users').limit(1).get().then(snap => {
          if (snap.empty) setMode('bootstrap');
          setCheckingBootstrap(false);
        }).catch(() => setCheckingBootstrap(false));
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        setError(''); setBusy(true);
        try {
          await auth.signInWithEmailAndPassword(email.trim(), password);
        } catch (err) {
          setError('ログインに失敗しました。メールアドレスとパスワードをご確認ください。');
        }
        setBusy(false);
      };

      const handleBootstrap = async (e) => {
        e.preventDefault();
        setError(''); setBusy(true);
        try {
          const cred = await auth.createUserWithEmailAndPassword(email.trim(), password);
          await db.collection('users').doc(cred.user.uid).set({
            name: name.trim() || '管理者', email: email.trim(), role: 'admin', active: true,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch (err) {
          setError('作成に失敗しました：' + (err && err.message ? err.message : ''));
        }
        setBusy(false);
      };

      if (checkingBootstrap) {
        return <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white"><div className="loader mb-4"></div><p className="font-bold text-sm">確認中...</p></div>;
      }

      return (
        <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 fade-in">
            <div className="text-center mb-6">
              <div className="inline-flex bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase mb-2">KST SYSTEM</div>
              <h1 className="text-lg font-black text-gray-800">KST育成ナビ</h1>
              <p className="text-xs text-gray-400 mt-1">{mode === 'bootstrap' ? '初回セットアップ：最初の管理者アカウントを作成します' : '指導者ログイン'}</p>
            </div>

            {error && <div className="bg-rose-50 text-rose-600 text-xs font-bold p-2 rounded mb-3 border border-rose-200">{error}</div>}

            <form onSubmit={mode === 'bootstrap' ? handleBootstrap : handleLogin} className="space-y-3">
              {mode === 'bootstrap' && (
                <div>
                  <label className="text-[10px] font-bold text-gray-500 block mb-1">お名前</label>
                  <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" placeholder="小柴 弘嵩" />
                </div>
              )}
              <div>
                <label className="text-[10px] font-bold text-gray-500 block mb-1">メールアドレス</label>
                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" placeholder="coach@example.com" />
              </div>
              <div>
                <label className="text-[10px] font-bold text-gray-500 block mb-1">パスワード</label>
                <input type="password" required minLength={6} value={password} onChange={e => setPassword(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" placeholder="6文字以上" />
              </div>
              <button type="submit" disabled={busy} className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-bold py-2.5 rounded-lg text-sm transition-colors">
                {busy ? '処理中...' : (mode === 'bootstrap' ? '管理者アカウントを作成' : 'ログイン')}
              </button>
            </form>

            {mode === 'login' && (
              <p className="text-[10px] text-gray-400 text-center mt-4">アカウントがない場合は管理者に発行を依頼してください。</p>
            )}
          </div>
        </div>
      );
    };

    // ================= 管理者ページ =================
    const ROLE_LABELS = { admin: '管理者', editor: '編集者', viewer: '閲覧のみ', coach: '編集者' };
    const normalizeRole = (r) => (r === 'coach' ? 'editor' : (r || 'editor'));

    const AdminPage = ({ profile, onBack }) => {
      const [users, setUsers] = useState(null);
      const [teams, setTeams] = useState([]);
      const [teamYearsMap, setTeamYearsMap] = useState({});
      const [teamsLoading, setTeamsLoading] = useState(true);
      const [groupEditTeam, setGroupEditTeam] = useState('');
      const [groupEditYear, setGroupEditYear] = useState('');

      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [role, setRole] = useState('editor');
      const [newUserTeams, setNewUserTeams] = useState([]);
      const [busy, setBusy] = useState(false);
      const [msg, setMsg] = useState('');
      const [error, setError] = useState('');

      const [newTeamName, setNewTeamName] = useState('');
      const [teamBusy, setTeamBusy] = useState(false);
      const [teamMsg, setTeamMsg] = useState('');

      const [expandedUser, setExpandedUser] = useState(null);

      useEffect(() => {
        const unsub = db.collection('users').orderBy('createdAt', 'asc').onSnapshot(snap => {
          setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, () => {
          db.collection('users').get().then(snap => setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        });
        return unsub;
      }, []);

      useEffect(() => {
        const unsub = db.collection('teams').onSnapshot(snap => {
          const yearsMap = {};
          snap.docs.forEach(d => { yearsMap[d.id] = (d.data() && d.data().years) ? d.data().years : {}; });
          const list = Object.keys(yearsMap).sort();
          setTeams(list);
          setTeamYearsMap(yearsMap);
          setTeamsLoading(false);
          setNewUserTeams(prev => prev.length ? prev : list);
          setGroupEditTeam(prev => prev && list.includes(prev) ? prev : (list[0] || ''));
        }, () => setTeamsLoading(false));
        return unsub;
      }, []);

      const groupEditYears = groupEditTeam && teamYearsMap[groupEditTeam] ? Object.keys(teamYearsMap[groupEditTeam]).sort() : [];
      useEffect(() => {
        if (groupEditYears.length && !groupEditYears.includes(groupEditYear)) setGroupEditYear(groupEditYears[0]);
      }, [groupEditTeam, JSON.stringify(groupEditYears), groupEditYear]);

      const selectedAdminYearData = (groupEditTeam && groupEditYear && teamYearsMap[groupEditTeam] && teamYearsMap[groupEditTeam][groupEditYear]) ? teamYearsMap[groupEditTeam][groupEditYear] : null;
      const adminGroups = mergeGroupSettings((selectedAdminYearData && selectedAdminYearData.groupSettings) || {});

      const saveYearGroupSettings = async (nextSettings) => {
        if (!groupEditTeam || !groupEditYear || !selectedAdminYearData) return;
        const currentYears = teamYearsMap[groupEditTeam] || {};
        const nextYears = {
          ...currentYears,
          [groupEditYear]: { ...selectedAdminYearData, groupSettings: nextSettings }
        };
        await db.collection('teams').doc(groupEditTeam).set({
          years: nextYears,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedBy: profile.name || profile.email
        }, { merge: true });
      };

      const updateGroupName = (groupId, name) => {
        const base = (selectedAdminYearData && selectedAdminYearData.groupSettings) || {};
        const defaultName = DEFAULT_GROUPS.find(g => g.id === groupId).name;
        saveYearGroupSettings({ ...base, [groupId]: { name: name || defaultName } });
      };

      const resetGroupNames = () => {
        if (!window.confirm(`${groupEditTeam} / ${groupEditYear}年度のグループ名を初期設定に戻しますか？`)) return;
        saveYearGroupSettings({});
      };

      const copyGroupNamesFromPreviousYear = () => {
        if (!groupEditTeam || !groupEditYear) return;
        const years = groupEditYears;
        const idx = years.indexOf(groupEditYear);
        if (idx <= 0) { alert('コピー元になる前年度がありません。'); return; }
        const prevYear = years[idx - 1];
        const prevSettings = (teamYearsMap[groupEditTeam][prevYear] && teamYearsMap[groupEditTeam][prevYear].groupSettings) || {};
        saveYearGroupSettings(prevSettings);
      };

      // ---- コーチ/管理者アカウントの追加 ----
      const handleAddCoach = async (e) => {
        e.preventDefault();
        setError(''); setMsg(''); setBusy(true);
        try {
          const secAuth = getSecondaryAuth();
          const cred = await secAuth.createUserWithEmailAndPassword(email.trim(), password);
          await db.collection('users').doc(cred.user.uid).set({
            name: name.trim(), email: email.trim(), role,
            allowedTeams: role === 'admin' ? [] : newUserTeams,
            active: true,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            createdBy: profile.email || ''
          });
          await secAuth.signOut();
          setName(''); setEmail(''); setPassword(''); setRole('editor'); setNewUserTeams(teams);
          setMsg('アカウントを作成しました。');
        } catch (err) {
          setError('作成に失敗しました：' + (err && err.message ? err.message : ''));
        }
        setBusy(false);
      };

      const toggleActive = (u) => db.collection('users').doc(u.id).update({ active: !u.active });
      const changeRole = (u, newRole) => db.collection('users').doc(u.id).update({ role: newRole });
      const resetPassword = async (u) => {
        try {
          await auth.sendPasswordResetEmail(u.email);
          alert(`${u.email} にパスワード再設定メールを送信しました。`);
        } catch (err) {
          alert('送信に失敗しました：' + (err && err.message ? err.message : ''));
        }
      };
      const toggleUserTeam = (u, teamName) => {
        const current = Array.isArray(u.allowedTeams) ? u.allowedTeams : [];
        const next = current.includes(teamName) ? current.filter(t => t !== teamName) : [...current, teamName];
        db.collection('users').doc(u.id).update({ allowedTeams: next });
      };
      const grantAllTeams = (u) => db.collection('users').doc(u.id).update({ allowedTeams: teams });
      const revokeAllTeams = (u) => db.collection('users').doc(u.id).update({ allowedTeams: [] });

      // ---- チーム管理 ----
      const handleAddTeamAdmin = async (e) => {
        e.preventDefault();
        const name2 = newTeamName.trim();
        if (!name2) return;
        if (teams.includes(name2)) { setTeamMsg('同名のチームが既に存在します。'); return; }
        setTeamBusy(true); setTeamMsg('');
        try {
          const years = { "2026": generateYearData() };
          await db.collection('teams').doc(name2).set({ years, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: profile.name || profile.email });
          setNewTeamName('');
          setTeamMsg(`「${name2}」を作成しました。`);
        } catch (err) {
          setTeamMsg('作成に失敗しました：' + (err && err.message ? err.message : ''));
        }
        setTeamBusy(false);
      };

      const handleRenameTeam = async (oldName) => {
        const newName = prompt(`新しいチーム名を入力してください（現在: ${oldName}）`, oldName);
        if (!newName || newName.trim() === '' || newName === oldName) return;
        if (teams.includes(newName)) { alert('同名のチームが既に存在します。'); return; }
        try {
          const doc = await db.collection('teams').doc(oldName).get();
          if (!doc.exists) return;
          await db.collection('teams').doc(newName).set(doc.data());
          await db.collection('teams').doc(oldName).delete();
          const usersSnap = await db.collection('users').get();
          const batch = db.batch();
          usersSnap.forEach(u => {
            const data = u.data();
            if (Array.isArray(data.allowedTeams) && data.allowedTeams.includes(oldName)) {
              batch.update(u.ref, { allowedTeams: data.allowedTeams.map(t => t === oldName ? newName : t) });
            }
          });
          await batch.commit();
        } catch (err) {
          alert('名称変更に失敗しました：' + (err && err.message ? err.message : ''));
        }
      };

      const handleDeleteTeam = async (teamName) => {
        if (!window.confirm(`「${teamName}」を削除します。全てのデータが失われ、元に戻せません。本当に削除しますか？`)) return;
        try {
          await db.collection('teams').doc(teamName).delete();
          const usersSnap = await db.collection('users').get();
          const batch = db.batch();
          usersSnap.forEach(u => {
            const data = u.data();
            if (Array.isArray(data.allowedTeams) && data.allowedTeams.includes(teamName)) {
              batch.update(u.ref, { allowedTeams: data.allowedTeams.filter(t => t !== teamName) });
            }
          });
          await batch.commit();
        } catch (err) {
          alert('削除に失敗しました：' + (err && err.message ? err.message : ''));
        }
      };

      return (
        <div className="min-h-screen bg-gray-100">
          <div className="bg-slate-900 text-white sticky top-0 z-40 shadow-xl">
            <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
              <div>
                <span className="bg-amber-500 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase mr-2">ADMIN</span>
                <span className="font-black">管理者ページ</span>
              </div>
              <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 text-xs font-bold px-3 py-1.5 rounded"><i className="fas fa-arrow-left mr-1"></i>アプリに戻る</button>
            </div>
          </div>

          <div className="max-w-5xl mx-auto p-4 space-y-6">

            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
              <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-3">
                <div>
                  <h2 className="font-black text-gray-800 text-sm"><i className="fas fa-layer-group text-purple-500 mr-1.5"></i>グループ設定</h2>
                  <p className="text-[10px] text-gray-400 font-bold mt-1">チーム・年度ごとに別々に保存します（A〜J/共通の内部IDは固定）</p>
                </div>
                <div className="flex flex-wrap gap-2 items-center">
                  <select value={groupEditTeam} onChange={e=>setGroupEditTeam(e.target.value)} className="border border-gray-300 rounded p-1.5 text-xs font-bold bg-white">
                    {teams.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <select value={groupEditYear} onChange={e=>setGroupEditYear(e.target.value)} className="border border-gray-300 rounded p-1.5 text-xs font-bold bg-white">
                    {groupEditYears.map(y => <option key={y} value={y}>{y}年度</option>)}
                  </select>
                  <button onClick={copyGroupNamesFromPreviousYear} className="bg-blue-50 text-blue-600 hover:bg-blue-100 text-[11px] font-bold px-2 py-1.5 rounded"><i className="fas fa-copy mr-1"></i>前年度からコピー</button>
                  <button onClick={resetGroupNames} className="bg-gray-100 hover:bg-gray-200 text-gray-600 text-[11px] font-bold px-2 py-1.5 rounded"><i className="fas fa-undo mr-1"></i>初期名に戻す</button>
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                {adminGroups.map(g => (
                  <div key={g.id} className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg p-2">
                    <span className="w-10 h-8 flex items-center justify-center rounded bg-slate-800 text-white text-xs font-black">{g.id}</span>
                    <input
                      value={g.name}
                      onChange={(e) => updateGroupName(g.id, e.target.value)}
                      className="flex-grow border border-gray-300 rounded p-2 text-xs font-bold bg-white"
                    />
                  </div>
                ))}
              </div>
              <p className="text-[10px] text-gray-400 mt-2">※年度を変えても、別年度のグループ名は変更されません。必要な時だけ「前年度からコピー」を押してください。</p>
            </div>

            {/* ---- チーム管理 ---- */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
              <div className="flex justify-between items-center mb-3">
                <h2 className="font-black text-gray-800 text-sm"><i className="fas fa-shield-alt text-emerald-500 mr-1.5"></i>チーム管理</h2>
                <button onClick={async () => {
                  const snap = await db.collection('teams').get();
                  const all = {};
                  snap.forEach(d => { all[d.id] = d.data().years; });
                  downloadBlob(`KST_全チームバックアップ_${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(all, null, 2), 'application/json');
                }} className="bg-gray-600 hover:bg-gray-500 text-white text-xs font-bold px-3 py-1.5 rounded"><i className="fas fa-file-download mr-1"></i>全チームをバックアップ(JSON)</button>
              </div>
              {teamMsg && <div className="bg-blue-50 text-blue-600 text-xs font-bold p-2 rounded mb-3 border border-blue-200">{teamMsg}</div>}
              <form onSubmit={handleAddTeamAdmin} className="flex gap-2 mb-4">
                <input value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} placeholder="新規チーム名（例：上京中学校）" className="flex-grow border border-gray-300 rounded p-2 text-sm" />
                <button disabled={teamBusy} type="submit" className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-bold px-4 py-2 rounded text-sm whitespace-nowrap"><i className="fas fa-plus mr-1"></i>チームを追加</button>
              </form>
              <div className="divide-y divide-gray-100 border border-gray-100 rounded-lg overflow-hidden">
                {teamsLoading && <div className="p-3 text-xs text-gray-400">読み込み中...</div>}
                {!teamsLoading && teams.length === 0 && <div className="p-3 text-xs text-gray-400">チームがありません</div>}
                {teams.map(t => (
                  <div key={t} className="flex items-center justify-between p-3 text-sm bg-white">
                    <span className="font-bold text-gray-700"><i className="fas fa-users-cog text-gray-400 mr-2"></i>{t}</span>
                    <div className="flex gap-2">
                      <button onClick={() => handleRenameTeam(t)} className="text-[11px] font-bold px-2 py-1 rounded bg-gray-100 hover:bg-gray-200"><i className="fas fa-pen mr-1"></i>名称変更</button>
                      <button onClick={() => handleDeleteTeam(t)} className="text-[11px] font-bold px-2 py-1 rounded bg-rose-50 text-rose-600 hover:bg-rose-100"><i className="fas fa-trash-alt mr-1"></i>削除</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* ---- アカウント追加 ---- */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
              <h2 className="font-black text-gray-800 mb-3 text-sm"><i className="fas fa-user-plus text-blue-500 mr-1.5"></i>アカウントを追加</h2>
              {error && <div className="bg-rose-50 text-rose-600 text-xs font-bold p-2 rounded mb-3 border border-rose-200">{error}</div>}
              {msg && <div className="bg-emerald-50 text-emerald-600 text-xs font-bold p-2 rounded mb-3 border border-emerald-200">{msg}</div>}
              <form onSubmit={handleAddCoach} className="space-y-3">
                <div className="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                  <div><label className="text-[10px] font-bold text-gray-500 block mb-1">名前</label><input required value={name} onChange={e=>setName(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm"/></div>
                  <div><label className="text-[10px] font-bold text-gray-500 block mb-1">メール</label><input required type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm"/></div>
                  <div><label className="text-[10px] font-bold text-gray-500 block mb-1">初期パスワード</label><input required minLength={6} value={password} onChange={e=>setPassword(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm"/></div>
                  <div>
                    <label className="text-[10px] font-bold text-gray-500 block mb-1">権限</label>
                    <select value={role} onChange={e=>setRole(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm">
                      <option value="editor">編集者（編集できる）</option>
                      <option value="viewer">閲覧のみ</option>
                      <option value="admin">管理者</option>
                    </select>
                  </div>
                </div>
                {role !== 'admin' && (
                  <div className="bg-gray-50 border border-gray-200 rounded-lg p-3">
                    <label className="text-[10px] font-bold text-gray-500 block mb-2">編集/閲覧を許可するチーム</label>
                    <div className="flex flex-wrap gap-2">
                      {teams.map(t => (
                        <label key={t} className={`text-xs font-bold px-2.5 py-1.5 rounded-full border cursor-pointer ${newUserTeams.includes(t) ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-500 border-gray-300'}`}>
                          <input type="checkbox" className="hidden" checked={newUserTeams.includes(t)} onChange={() => setNewUserTeams(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev, t])} />
                          {t}
                        </label>
                      ))}
                      {teams.length === 0 && <span className="text-xs text-gray-400">先にチームを作成してください</span>}
                    </div>
                  </div>
                )}
                <button disabled={busy} type="submit" className="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-bold px-4 py-2 rounded text-sm">アカウントを作成</button>
              </form>
            </div>

            {/* ---- アカウント一覧 ---- */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <h2 className="font-black text-gray-800 text-sm p-5 pb-3"><i className="fas fa-users text-blue-500 mr-1.5"></i>アカウント一覧</h2>
              <table className="w-full text-left text-xs">
                <thead><tr className="bg-gray-50 text-gray-500 font-bold border-y">
                  <th className="p-3">名前</th><th className="p-3">メール</th><th className="p-3">権限</th><th className="p-3">状態</th><th className="p-3">チーム権限</th><th className="p-3">操作</th>
                </tr></thead>
                <tbody className="divide-y divide-gray-100">
                  {(users || []).map(u => {
                    const uRole = normalizeRole(u.role);
                    const hasExplicitTeams = Array.isArray(u.allowedTeams);
                    return (
                      <React.Fragment key={u.id}>
                        <tr className={!u.active ? 'opacity-40' : ''}>
                          <td className="p-3 font-bold">{u.name}</td>
                          <td className="p-3">{u.email}</td>
                          <td className="p-3">
                            <select value={uRole} onChange={e=>changeRole(u, e.target.value)} className="border border-gray-300 rounded p-1 text-xs">
                              <option value="editor">編集者</option>
                              <option value="viewer">閲覧のみ</option>
                              <option value="admin">管理者</option>
                            </select>
                          </td>
                          <td className="p-3">{u.active ? <span className="text-emerald-600 font-bold">有効</span> : <span className="text-gray-400 font-bold">無効</span>}</td>
                          <td className="p-3">
                            {uRole === 'admin' ? (
                              <span className="text-[11px] text-gray-400">全チーム（管理者）</span>
                            ) : (
                              <button onClick={() => setExpandedUser(expandedUser === u.id ? null : u.id)} className="text-[11px] font-bold px-2 py-1 rounded bg-gray-100 hover:bg-gray-200">
                                {hasExplicitTeams ? `${u.allowedTeams.length}チーム` : '全チーム（未設定）'} <i className="fas fa-caret-down ml-1"></i>
                              </button>
                            )}
                          </td>
                          <td className="p-3 flex gap-2 flex-wrap">
                            <button onClick={() => toggleActive(u)} className="text-[11px] font-bold px-2 py-1 rounded bg-gray-100 hover:bg-gray-200">{u.active ? '無効化' : '有効化'}</button>
                            <button onClick={() => resetPassword(u)} className="text-[11px] font-bold px-2 py-1 rounded bg-gray-100 hover:bg-gray-200">PW再設定</button>
                          </td>
                        </tr>
                        {expandedUser === u.id && uRole !== 'admin' && (
                          <tr>
                            <td colSpan="6" className="p-3 bg-gray-50">
                              <div className="flex items-center justify-between mb-2">
                                <span className="text-[11px] font-bold text-gray-500">「{u.name}」がアクセスできるチーム（チェックで編集/閲覧を許可）</span>
                                <div className="flex gap-2">
                                  <button onClick={() => grantAllTeams(u)} className="text-[10px] font-bold px-2 py-1 rounded bg-blue-50 text-blue-600 hover:bg-blue-100">全て許可</button>
                                  <button onClick={() => revokeAllTeams(u)} className="text-[10px] font-bold px-2 py-1 rounded bg-rose-50 text-rose-600 hover:bg-rose-100">全て解除</button>
                                </div>
                              </div>
                              <div className="flex flex-wrap gap-2">
                                {teams.map(t => {
                                  const checked = Array.isArray(u.allowedTeams) && u.allowedTeams.includes(t);
                                  return (
                                    <label key={t} className={`text-xs font-bold px-2.5 py-1.5 rounded-full border cursor-pointer ${checked ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-500 border-gray-300'}`}>
                                      <input type="checkbox" className="hidden" checked={checked} onChange={() => toggleUserTeam(u, t)} />
                                      {t}
                                    </label>
                                  );
                                })}
                                {teams.length === 0 && <span className="text-xs text-gray-400">チームがありません</span>}
                              </div>
                              {!hasExplicitTeams && <p className="text-[10px] text-amber-600 mt-2"><i className="fas fa-info-circle mr-1"></i>まだチーム権限が未設定のため、現在は全チームを利用できています。チェックを1つでも操作すると、選択したチームのみに制限されます。</p>}
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    );
                  })}
                  {users && users.length === 0 && <tr><td colSpan="6" className="p-4 text-center text-gray-400">アカウントがありません</td></tr>}
                </tbody>
              </table>
            </div>
            <p className="text-[10px] text-gray-400">※「無効化」したアカウントはこのアプリへのログインができなくなります（既にログイン中の場合は次回チェック時に自動的にログアウトされます）。<br/>※「閲覧のみ」権限のアカウントは、許可されたチームのデータを見ることはできますが、編集・保存はできません。</p>
          </div>
        </div>
      );
    };

    // ================= メインアプリ（練習管理） =================
    // ================= コメントスレッド（育成計画・振り返り共通） =================
    const CommentThread = ({ comments, onAdd, onDelete, isViewer }) => {
      const [text, setText] = useState('');
      const list = comments || [];
      return (
        <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mt-2">
          <div className="text-[11px] font-black text-gray-500 mb-2"><i className="fas fa-comments mr-1.5"></i>コーチ間コメント（{list.length}）</div>
          <div className="space-y-2 mb-3 max-h-48 overflow-y-auto">
            {list.length === 0 && <p className="text-[11px] text-gray-400">まだコメントはありません。</p>}
            {list.slice().sort((a,b)=>a.at-b.at).map(c => (
              <div key={c.id} className="bg-white border border-gray-200 rounded-lg p-2 text-xs flex justify-between items-start gap-2">
                <div>
                  <div className="font-bold text-gray-700">{c.author} <span className="text-[10px] text-gray-400 font-normal ml-1">{new Date(c.at).toLocaleString('ja-JP')}</span></div>
                  <div className="text-gray-600 whitespace-pre-wrap">{c.text}</div>
                </div>
                {!isViewer && <button onClick={() => onDelete(c.id)} className="text-gray-300 hover:text-red-500 text-[11px] no-print"><i className="fas fa-times"></i></button>}
              </div>
            ))}
          </div>
          {!isViewer && (
            <div className="flex gap-2 no-print">
              <input value={text} onChange={e=>setText(e.target.value)} placeholder="コメントを追加..." className="flex-grow border border-gray-300 rounded p-2 text-xs" onKeyDown={e => { if (e.key === 'Enter') { onAdd(text); setText(''); } }} />
              <button onClick={() => { onAdd(text); setText(''); }} className="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-3 py-2 rounded">送信</button>
            </div>
          )}
        </div>
      );
    };

    const TrainingApp = ({ profile, onGoAdmin, onLogout }) => {
      const [globalStore, setGlobalStore] = useState(null);
      const [teamPublicInfoMap, setTeamPublicInfoMap] = useState({}); // { [team]: {greeting, contact, faq} } 保護者ページ用のクラブ情報
      const [legacyGroupSettings, setLegacyGroupSettings] = useState({});
      const [isLoading, setIsLoading] = useState(true);

      const [currentTeam, setCurrentTeam] = useState(() => localStorage.getItem('kst_v6_team') || "西ノ京中学校");
      const [currentYear, setCurrentYear] = useState(() => localStorage.getItem('kst_v6_year') || "2026");
      const [currentBucket, setCurrentBucket] = useState(() => localStorage.getItem('kst_v6_bucket') || "男子");

      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedGroup, setSelectedGroup] = useState("A");

      const [showSaveMessage, setShowSaveMessage] = useState(false);
      const [history, setHistory] = useState([]);
      const [lastMeta, setLastMeta] = useState({}); // { [team]: {updatedBy, updatedAt} }

      // ローカルで編集中のチームは、リモートからのスナップショット反映を一時停止する。
      // 以前は「保存処理が完了した瞬間」にこれを解除していたが、そのタイミングと
      // Firestoreからのエコー（自分の書き込みが返ってくる）が重なると、日本語入力中に
      // 入力欄の内容が一瞬巻き戻り、IME変換がおかしくなる（例:「テニス」→「テニステニス」）
      // 原因になっていた。書き込み完了ではなく「最後に編集した時刻」を基準に、
      // 一定時間（保存デバウンス＋通信往復分の余裕）はスナップショットの反映を保留する。
      const dirtyTeamRef = useRef(null);
      const lastEditAtRef = useRef({}); // { [team]: timestamp } 最後にこのチームを編集した時刻
      const EDIT_GRACE_MS = 2500;
      const saveTimerRef = useRef(null);
      const lastSentRef = useRef({}); // { [team]: jsonString } 自分が最後に送った内容（エコー判定用）
      const publicInfoTimerRef = useRef(null);

      const isViewer = normalizeRole(profile.role) === 'viewer';
      const isAdmin = normalizeRole(profile.role) === 'admin';

      // ---- Firestore: 全チームをリアルタイム購読（削除にも追従するよう毎回完全に組み直す） ----
      useEffect(() => {
        const unsub = db.collection('teams').onSnapshot(snapshot => {
          if (snapshot.empty) {
            // 初回起動：初期データを書き込む
            const batch = db.batch();
            Object.entries(initialGlobalStore).forEach(([teamName, years]) => {
              batch.set(db.collection('teams').doc(teamName), { years, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: profile.name || profile.email });
            });
            batch.commit();
            return;
          }
          const meta = {};
          const publicInfoMap = {};
          setGlobalStore(prev => {
            const store = {};
            snapshot.forEach(doc => {
              const data = doc.data();
              meta[doc.id] = { updatedBy: data.updatedBy, updatedAt: data.updatedAt };
              publicInfoMap[doc.id] = data.publicInfo || { greeting: '', contact: '', faq: [] };
              const recentlyEditingThis = lastEditAtRef.current[doc.id] && (Date.now() - lastEditAtRef.current[doc.id] < EDIT_GRACE_MS);
              if ((doc.id === dirtyTeamRef.current || recentlyEditingThis) && prev && prev[doc.id]) {
                store[doc.id] = prev[doc.id]; // 保存待ち・編集直後の自分の内容を優先
              } else {
                store[doc.id] = data.years;
              }
            });
            return store;
          });
          setLastMeta(meta);
          setTeamPublicInfoMap(publicInfoMap);
          setIsLoading(false);
        }, err => { console.error('購読エラー', err); setIsLoading(false); });
        return unsub;
      }, []);

      useEffect(() => {
        // 旧バージョンで全年度共通に保存していたグループ名がある場合だけ、初期表示の予備として読む
        const unsub = db.collection('appSettings').doc('ui').onSnapshot(doc => {
          setLegacyGroupSettings((doc.exists && doc.data().groups) ? doc.data().groups : {});
        });
        return unsub;
      }, []);

      // ---- このユーザーが見える/編集できるチーム一覧（管理者は常に全チーム） ----
      const allowedTeamsForUser = isAdmin ? null : (Array.isArray(profile.allowedTeams) ? profile.allowedTeams : null);
      const visibleTeams = globalStore ? Object.keys(globalStore).filter(t => allowedTeamsForUser === null || allowedTeamsForUser.includes(t)).sort() : [];

      // 権限がないチームを選んでいる場合は、見えるチームに自動で切り替える
      useEffect(() => {
        if (globalStore && visibleTeams.length && !visibleTeams.includes(currentTeam)) {
          setCurrentTeam(visibleTeams[0]);
        }
      }, [globalStore, JSON.stringify(visibleTeams), currentTeam]);

      useEffect(() => {
        localStorage.setItem('kst_v6_team', currentTeam);
        localStorage.setItem('kst_v6_year', currentYear);
        localStorage.setItem('kst_v6_bucket', currentBucket);
      }, [currentTeam, currentYear, currentBucket]);

      // 派生データ（globalStoreが未取得でも安全なフォールバックを用意）
      const teamData = (globalStore && globalStore[currentTeam]) || { "2026": generateYearData() };
      const availableYears = Object.keys(teamData).sort();
      const actualYear = availableYears.includes(currentYear) ? currentYear : availableYears[0];
      let yearData = teamData[actualYear];
      if (!yearData || !yearData['男子']) yearData = generateYearData();
      const groupList = mergeGroupSettings(yearData.groupSettings || legacyGroupSettings);
      const currentData = normalizeBucketData(yearData[currentBucket]);

      // チーム / 年度 / 男女共通バケツを切り替えたら、そのチーム・そのバケツが
      // 保持している「現在の進行フェーズ」に編集対象グループを追従させる（バグ修正の本体）
      useEffect(() => {
        setSelectedGroup(currentData.activeGroup || 'A');
      }, [currentTeam, actualYear, currentBucket, currentData.activeGroup]);

      // ---- 更新履歴（操作ログ） ----
      const [activityLog, setActivityLog] = useState([]);
      useEffect(() => {
        const unsub = db.collection('teams').doc(currentTeam).collection('activity').orderBy('updatedAt', 'desc').limit(30)
          .onSnapshot(snap => setActivityLog(snap.docs.map(d => ({ id: d.id, ...d.data() }))), () => setActivityLog([]));
        return unsub;
      }, [currentTeam]);

      // ---- 通知: 他の指導者の更新をベル通知＋未読バッジで知らせる ----
      // トーストだけだと連続更新時に見逃してしまうため、既読／未読を管理して
      // 「いつでも見返せる」形にする（既読状態はチームごとにlocalStorageへ保存）
      const [toast, setToast] = useState(null);
      const [notifOpen, setNotifOpen] = useState(false);
      const [photoUploading, setPhotoUploading] = useState(null); // アップロード中のtournament idx
      const [gameDayId, setGameDayId] = useState(null); // 大会当日モードで選択中の大会id
      const [calendarMonth, setCalendarMonth] = useState(null); // カレンダータブで表示中の月
      const [dayModal, setDayModal] = useState(null); // { day, month, idxs } タップした日の予定編集
      const [yearMgmtOpen, setYearMgmtOpen] = useState(false);
      const [newYearInput, setNewYearInput] = useState('');
      const [lastSeenMap, setLastSeenMap] = useState(() => {
        try { return JSON.parse(localStorage.getItem('kst_notif_seen') || '{}'); } catch (e) { return {}; }
      });
      const seenMetaRef = useRef({});
      const myName = profile.name || profile.email;

      useEffect(() => {
        const m = lastMeta[currentTeam];
        if (!m || !m.updatedAt || !m.updatedAt.toMillis) return;
        const millis = m.updatedAt.toMillis();
        const prevSeen = seenMetaRef.current[currentTeam];
        if (prevSeen !== undefined && millis > prevSeen && m.updatedBy && m.updatedBy !== myName) {
          setToast(`${m.updatedBy} さんが「${currentTeam}」を更新しました`);
          setTimeout(() => setToast(null), 4000);
        }
        seenMetaRef.current[currentTeam] = millis;
      }, [lastMeta, currentTeam]);

      const teamLastSeen = lastSeenMap[currentTeam] || 0;
      const otherPeopleActivity = activityLog.filter(a => a.updatedBy && a.updatedBy !== myName && a.updatedAt && a.updatedAt.toMillis);
      const unreadCount = otherPeopleActivity.filter(a => a.updatedAt.toMillis() > teamLastSeen).length;

      const openNotifPanel = () => {
        setNotifOpen(prev => !prev);
        if (!notifOpen) {
          const latest = otherPeopleActivity[0];
          const seenAt = latest ? latest.updatedAt.toMillis() : Date.now();
          setLastSeenMap(prev => {
            const next = { ...prev, [currentTeam]: seenAt };
            try { localStorage.setItem('kst_notif_seen', JSON.stringify(next)); } catch (e) {}
            return next;
          });
        }
      };

      const formatRelativeTime = (ms) => {
        const diff = Date.now() - ms;
        if (diff < 60000) return '今';
        if (diff < 3600000) return `${Math.floor(diff/60000)}分前`;
        if (diff < 86400000) return `${Math.floor(diff/3600000)}時間前`;
        return `${Math.floor(diff/86400000)}日前`;
      };

      if (isLoading || !globalStore) {
        return <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white"><div className="loader mb-4"></div><p className="font-bold">同期中...</p></div>;
      }

      if (!isAdmin && visibleTeams.length === 0) {
        return (
          <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white gap-4 p-4 text-center">
            <p className="font-bold text-sm">アクセスできるチームがありません。管理者にチーム権限の設定を依頼してください。</p>
            <button onClick={onLogout} className="bg-slate-700 hover:bg-slate-600 text-xs font-bold px-4 py-2 rounded">ログアウト</button>
          </div>
        );
      }

      // ---- 保存処理（デバウンス + チーム単位でFirestoreに書き込み + 履歴/公開カレンダーの更新） ----
      const persist = (teamName, years, changedBucketData) => {
        dirtyTeamRef.current = teamName;
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(() => {
          const payload = { years, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: profile.name || profile.email };
          lastSentRef.current[teamName] = JSON.stringify(years);
          db.collection('teams').doc(teamName).set(payload, { merge: true })
            .then(() => {
              setShowSaveMessage(true);
              setTimeout(() => setShowSaveMessage(false), 1200);
              dirtyTeamRef.current = null;
            })
            .catch(err => { console.error('保存エラー', err); dirtyTeamRef.current = null; });

          // 変更履歴（操作ログ）: チームごとに直近の更新を追記していく
          db.collection('teams').doc(teamName).collection('activity').add({
            bucket: currentBucket, year: actualYear, updatedBy: profile.name || profile.email,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }).catch(() => {});

          // 保護者向け公開カレンダー: 大会情報（結果含む）だけを別コレクションにミラーする
          // ※ set()のドット付きキーはネストしたフィールドとして解釈されない場合があるため、
          //   男子・女子・共通の3バケツ分をまとめて通常のネストしたオブジェクトとして書き込む
          if (years && years[actualYear]) {
            const yearBuckets = years[actualYear];
            const tournamentsByBucket = {};
            BUCKETS.forEach(b => {
              tournamentsByBucket[b] = ((yearBuckets[b] && yearBuckets[b].tournaments) || []).map(t => ({
                group: inferTournamentGroup(t), month: t.month, date: t.date, name: t.name, category: t.category, target: t.target, result: t.result || '', eventType: t.eventType || guessEventType(t), org: t.org || '学校部活', place: t.place || '', meeting: t.meeting || '', belongings: t.belongings || '', notice: t.notice || '', parentVisible: t.parentVisible !== false, photoUrl: t.photoDataUrl || ''
              }));
            });
            db.collection('publicCalendars').doc(teamName).set({
              tournaments: tournamentsByBucket,
              teamName,
              year: actualYear,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).catch(() => {});
          }
        }, 900);
      };

      const updateStore = (updater) => {
        if (isViewer) return; // 閲覧のみ権限では保存させない
        lastEditAtRef.current[currentTeam] = Date.now();
        // undo履歴には「今回変更するバケツの変更前データ」だけを保存する。
        // 以前は編集のたびにglobalStore全体（全チーム・全年度・写真データ含む）を
        // 丸ごとコピーしていたため、キー入力ごとに重い処理が走り、日本語入力の
        // 変換がおかしくなる原因になっていた。
        const beforeBucket = normalizeBucketData(globalStore[currentTeam][actualYear][currentBucket]);
        setHistory(h => [...h.slice(-9), { team: currentTeam, year: actualYear, bucket: currentBucket, data: beforeBucket }]);
        setGlobalStore(prev => {
          const prevYears = prev[currentTeam][actualYear];
          const normalizedBucket = normalizeBucketData(prevYears[currentBucket]);
          const newBucketData = updater(normalizedBucket);
          const newYears = { ...prevYears, [currentBucket]: newBucketData };
          const newTeamYears = { ...prev[currentTeam], [actualYear]: newYears };
          persist(currentTeam, newTeamYears, newBucketData);
          return { ...prev, [currentTeam]: newTeamYears };
        });
      };

      const updateActiveGroup = (value) => updateStore(d => ({ ...d, activeGroup: value }));

      // ---- 保護者ページ用のクラブ情報（ごあいさつ・連絡先・FAQ） ----
      const currentPublicInfo = teamPublicInfoMap[currentTeam] || { greeting: '', contact: '', faq: [] };
      const persistPublicInfo = (nextInfo) => {
        if (publicInfoTimerRef.current) clearTimeout(publicInfoTimerRef.current);
        publicInfoTimerRef.current = setTimeout(() => {
          db.collection('teams').doc(currentTeam).set({ publicInfo: nextInfo }, { merge: true }).catch(() => {});
          db.collection('publicCalendars').doc(currentTeam).set({ publicInfo: nextInfo, teamName: currentTeam, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(() => {});
        }, 700);
      };
      const updatePublicInfo = (field, value) => {
        if (isViewer) return;
        lastEditAtRef.current[currentTeam] = Date.now();
        const next = { ...currentPublicInfo, [field]: value };
        setTeamPublicInfoMap(prev => ({ ...prev, [currentTeam]: next }));
        persistPublicInfo(next);
      };
      const addFaqItem = () => {
        if (isViewer) return;
        const next = { ...currentPublicInfo, faq: [...(currentPublicInfo.faq || []), { id: uid('faq'), q: '', a: '' }] };
        setTeamPublicInfoMap(prev => ({ ...prev, [currentTeam]: next }));
        persistPublicInfo(next);
      };
      const updateFaqItem = (idx, field, value) => {
        if (isViewer) return;
        lastEditAtRef.current[currentTeam] = Date.now();
        const arr = [...(currentPublicInfo.faq || [])];
        arr[idx] = { ...arr[idx], [field]: value };
        const next = { ...currentPublicInfo, faq: arr };
        setTeamPublicInfoMap(prev => ({ ...prev, [currentTeam]: next }));
        persistPublicInfo(next);
      };
      const deleteFaqItem = (idx) => {
        if (isViewer) return;
        if (!window.confirm('このFAQを削除しますか？')) return;
        const next = { ...currentPublicInfo, faq: (currentPublicInfo.faq || []).filter((_, i) => i !== idx) };
        setTeamPublicInfoMap(prev => ({ ...prev, [currentTeam]: next }));
        persistPublicInfo(next);
      };

      const handleUndo = () => {
        if (isViewer) return;
        if (history.length === 0) return;
        const last = history[history.length - 1];
        setHistory(prev => prev.slice(0, -1));
        setGlobalStore(prev => {
          const prevYears = prev[last.team][last.year];
          const newYears = { ...prevYears, [last.bucket]: last.data };
          const newTeamYears = { ...prev[last.team], [last.year]: newYears };
          persist(last.team, newTeamYears);
          return { ...prev, [last.team]: newTeamYears };
        });
      };

      // チームの新規作成・名称変更・削除は管理者ページに集約（誤操作防止のため）

      const handleAddYear = () => {
        if (isViewer) return;
        const nextYear = String(Number(actualYear) + 1);
        if (window.confirm(`${nextYear}年度を作成し、ノウハウを引き継ぎますか？`)) {
          const newYearData = generateYearData();
          BUCKETS.forEach(b => {
            newYearData[b].plans = teamData[actualYear][b].plans;
            newYearData[b].practices = teamData[actualYear][b].practices;
          });
          // 新年度作成時だけ、現在年度のグループ名を初期値として引き継ぐ（作成後は年度ごとに独立）
          newYearData.groupSettings = { ...(teamData[actualYear].groupSettings || legacyGroupSettings || {}) };
          const newTeamYears = { ...teamData, [nextYear]: newYearData };
          // 年度作成は履歴に積まない（構造が異なるため。誤操作は個別の確認ダイアログで防止）
          setGlobalStore(prev => ({ ...prev, [currentTeam]: newTeamYears }));
          persist(currentTeam, newTeamYears);
          setCurrentYear(nextYear);
        }
      };

      // ---- 年度管理（任意の年度を追加／名称変更／削除） ----
      const addCustomYear = (yearLabel, carryOver) => {
        if (isViewer) return;
        const label = String(yearLabel || '').trim();
        if (!label) { alert('年度を入力してください。'); return; }
        if (teamData[label]) { alert('その年度は既に存在します。'); return; }
        const newYearData = generateYearData();
        if (carryOver) {
          BUCKETS.forEach(b => {
            newYearData[b].plans = teamData[actualYear][b].plans;
            newYearData[b].practices = teamData[actualYear][b].practices;
          });
          newYearData.groupSettings = { ...(teamData[actualYear].groupSettings || legacyGroupSettings || {}) };
        }
        const newTeamYears = { ...teamData, [label]: newYearData };
        // 年度の追加・名称変更・削除は履歴に積まない（構造が異なるため。個別の確認ダイアログで防止）
        setGlobalStore(prev => ({ ...prev, [currentTeam]: newTeamYears }));
        persist(currentTeam, newTeamYears);
        setCurrentYear(label);
      };
      const renameYear = (oldYear) => {
        if (!isAdmin) return;
        const newYear = prompt(`新しい年度名を入力してください（現在: ${oldYear}）`, oldYear);
        if (!newYear || !newYear.trim() || newYear === oldYear) return;
        if (teamData[newYear]) { alert('その年度は既に存在します。'); return; }
        const newTeamYears = { ...teamData };
        newTeamYears[newYear] = newTeamYears[oldYear];
        delete newTeamYears[oldYear];
        // 年度の追加・名称変更・削除は履歴に積まない（構造が異なるため。個別の確認ダイアログで防止）
        setGlobalStore(prev => ({ ...prev, [currentTeam]: newTeamYears }));
        persist(currentTeam, newTeamYears);
        if (actualYear === oldYear) setCurrentYear(newYear);
      };
      const deleteYear = (year) => {
        if (!isAdmin) return;
        if (availableYears.length <= 1) { alert('最後の年度は削除できません。'); return; }
        if (!window.confirm(`${year}年度のデータを完全に削除します。元に戻せません。本当に削除しますか？`)) return;
        const newTeamYears = { ...teamData };
        delete newTeamYears[year];
        // 年度の追加・名称変更・削除は履歴に積まない（構造が異なるため。個別の確認ダイアログで防止）
        setGlobalStore(prev => ({ ...prev, [currentTeam]: newTeamYears }));
        persist(currentTeam, newTeamYears);
        if (actualYear === year) {
          const remaining = Object.keys(newTeamYears).sort();
          setCurrentYear(remaining[0]);

      };

      // === データ更新 ===
      const updateTournament = (idx, field, value) => updateStore(d => { const arr = [...d.tournaments]; arr[idx][field] = value; return {...d, tournaments: arr}; });
      const addTournament = () => {
        if (isViewer) return;

      const addTournamentOnDate = (monthLabel, day) => {

      };
      const deleteTournament = (idx) => { if(window.confirm('削除しますか？')) updateStore(d => ({...d, tournaments: d.tournaments.filter((_, i) => i !== idx)})); };
      const updatePlan = (field, value) => updateStore(d => ({
        ...d,
        plans: {...d.plans, [selectedGroup]: {...d.plans[selectedGroup], [field]: value}},
        // 育成計画を変更したら「練習メニュー」「振り返り」に見直しフラグを立てる（自動で内容は書き換えず、確認を促すだけ）
        reviewFlags: {...d.reviewFlags, [selectedGroup]: { practice: true, reflection: true }}
      }));
      const clearReviewFlag = (group, kind) => updateStore(d => ({...d, reviewFlags: {...d.reviewFlags, [group]: {...(d.reviewFlags[group]||{}), [kind]: false}}}));
      const updatePractice = (idx, field, value) => updateStore(d => { const arr = [...d.practices[selectedGroup]]; arr[idx][field] = value; return {...d, practices: {...d.practices, [selectedGroup]: arr}}; });
      const addPractice = () => updateStore(d => { const arr = d.practices[selectedGroup] || []; return {...d, practices: {...d.practices, [selectedGroup]: [...arr, {id: uid('pr'), week:`第${arr.length+1}週`, theme:'', drill:''}]}}; });
      const deletePractice = (idx) => { if(window.confirm('削除しますか？')) updateStore(d => ({...d, practices: {...d.practices, [selectedGroup]: d.practices[selectedGroup].filter((_, i) => i !== idx)}})); };
      const updateReflection = (field, value) => updateStore(d => ({...d, reflections: {...d.reflections, [selectedGroup]: {...d.reflections[selectedGroup], [field]: value}}}));

      // ---- 大会結果 ----
      const updateTournamentResult = (idx, value) => updateStore(d => { const arr = [...d.tournaments]; arr[idx] = { ...arr[idx], result: value }; return { ...d, tournaments: arr }; });

      // ---- コメント（育成計画・振り返り） ----
      const addPlanComment = (text) => { if (!text || !text.trim()) return; updateStore(d => ({...d, plans: {...d.plans, [selectedGroup]: {...d.plans[selectedGroup], comments: [...(d.plans[selectedGroup].comments||[]), {id: uid('cm'), author: profile.name || profile.email, text: text.trim(), at: Date.now()}]}}})); };
      const deletePlanComment = (cid) => updateStore(d => ({...d, plans: {...d.plans, [selectedGroup]: {...d.plans[selectedGroup], comments: (d.plans[selectedGroup].comments||[]).filter(c=>c.id!==cid)}}}));
      const addReflectionComment = (text) => { if (!text || !text.trim()) return; updateStore(d => ({...d, reflections: {...d.reflections, [selectedGroup]: {...d.reflections[selectedGroup], comments: [...(d.reflections[selectedGroup].comments||[]), {id: uid('cm'), author: profile.name || profile.email, text: text.trim(), at: Date.now()}]}}})); };
      const deleteReflectionComment = (cid) => updateStore(d => ({...d, reflections: {...d.reflections, [selectedGroup]: {...d.reflections[selectedGroup], comments: (d.reflections[selectedGroup].comments||[]).filter(c=>c.id!==cid)}}}));

      // ---- 名簿 ----
      const addPlayer = () => updateStore(d => ({...d, roster: [...(d.roster||[]), {id: uid('pl'), name: '新しい選手', grade: '', position: '後衛', note: '', active: true}]}));
      const updatePlayer = (idx, field, value) => updateStore(d => { const arr = [...(d.roster||[])]; arr[idx] = {...arr[idx], [field]: value}; return {...d, roster: arr}; });
      const deletePlayer = (idx) => { if(window.confirm('選手を削除しますか？（出欠記録も一緒に削除されます）')) updateStore(d => { const removedId = (d.roster||[])[idx] && d.roster[idx].id; const roster = (d.roster||[]).filter((_,i)=>i!==idx); const sessions = (d.sessions||[]).map(s => { const att = {...s.attendance}; delete att[removedId]; return {...s, attendance: att}; }); return {...d, roster, sessions}; }); };

      // ---- 出欠 ----
      const addSession = () => updateStore(d => ({...d, sessions: [...(d.sessions||[]), {id: uid('se'), date: new Date().toISOString().slice(0,10), note: '', attendance: {}}]}));
      const updateSessionField = (idx, field, value) => updateStore(d => { const arr = [...(d.sessions||[])]; arr[idx] = {...arr[idx], [field]: value}; return {...d, sessions: arr}; });
      const deleteSession = (idx) => { if(window.confirm('この出欠記録を削除しますか？')) updateStore(d => ({...d, sessions: (d.sessions||[]).filter((_,i)=>i!==idx)})); };
      const toggleAttendance = (sessionIdx, playerId) => updateStore(d => { const arr = [...(d.sessions||[])]; const s = {...arr[sessionIdx]}; s.attendance = {...s.attendance, [playerId]: !s.attendance[playerId]}; arr[sessionIdx] = s; return {...d, sessions: arr}; });

      // ---- エクスポート ----
      const exportTeamJson = () => {
        downloadBlob(`${currentTeam}_${actualYear}.json`, JSON.stringify(teamData[actualYear], null, 2), 'application/json');
      };
      const exportTournamentsCsv = () => {
        const rows = [['グループ','開催月','日程','大会名','カテゴリ','位置付け','結果']];
        currentData.tournaments.forEach(t => rows.push([t.id, t.month, t.date, t.name, t.category, (t.target||'').replace(/\n/g,' '), (t.result||'').replace(/\n/g,' ')]));
        const csv = rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
        downloadBlob(`${currentTeam}_${currentBucket}_大会一覧.csv`, '\uFEFF' + csv, 'text/csv');
      };

      // ---- 保護者向け共有リンク ----
      const publicLinkUrl = `${window.location.origin}${window.location.pathname}?public=1&team=${encodeURIComponent(currentTeam)}`;
      const copyPublicLink = async () => {
        try {
          await navigator.clipboard.writeText(publicLinkUrl);
          alert('共有リンクをコピーしました。\n' + publicLinkUrl);
        } catch (e) {
          prompt('このURLをコピーしてください:', publicLinkUrl);
        }
      };

      // ---- 保護者連絡用メッセージ（LINE等にそのまま貼れる文章） ----
      const buildParentMessage = (t) => {
        if (!t) return '';
        const lines = [`【${t.name || '大会'}】`];
        const dateLine = `${t.month || ''} ${t.date && t.date !== '日程確定後記入' ? t.date : ''}`.trim();
        if (dateLine) lines.push(dateLine);
        if (t.place) lines.push(`場所：${t.place}`);
        if (t.meeting) lines.push(`集合：${t.meeting}`);
        if (t.belongings) lines.push(`持ち物：${t.belongings}`);
        if (t.notice) lines.push(`連絡事項：${t.notice}`);
        return lines.join('\n');
      };
      const copyParentMessage = async (t) => {
        const text = buildParentMessage(t);
        try {
          await navigator.clipboard.writeText(text);
          alert('コピーしました。LINE等に貼り付けてください。');
        } catch (e) {
          prompt('このテキストをコピーしてください:', text);
        }
      };

      // ---- 写真1枚添付（大会・活動の様子） ----
      // ※ Firebase Storageを別途セットアップしなくても使えるように、
      //   ブラウザ側で縮小・圧縮してからFirestoreに直接保存する（1文書1MBの上限に収めるため）
      const uploadTournamentPhoto = (idx, file) => {
        if (!file || isViewer) return;
        setPhotoUploading(idx);
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxW = 640;
            const scale = Math.min(1, maxW / img.width);
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            if (dataUrl.length > 700000) {
              alert('写真の圧縮後もサイズが大きすぎます。別の写真をお試しください。');
            } else {
              updateTournament(idx, 'photoDataUrl', dataUrl);
            }
            setPhotoUploading(null);
          };
          img.onerror = () => { alert('写真の読み込みに失敗しました。'); setPhotoUploading(null); };
          img.src = reader.result;
        };
        reader.onerror = () => { alert('写真の読み込みに失敗しました。'); setPhotoUploading(null); };
        reader.readAsDataURL(file);
      };
      const removeTournamentPhoto = (idx) => {
        updateTournament(idx, 'photoDataUrl', '');
      };


      // ---- 便利機能: 日付・種別・未入力チェック ----
      const parseEventDate = (t) => {
        const m1 = String(t.month || '').match(/(\d{1,2})\s*月/);
        const d1 = String(t.date || '').match(/(\d{1,2})\s*[\/月]\s*(\d{1,2})?/);
        const m = d1 && d1[2] ? Number(d1[1]) : (m1 ? Number(m1[1]) : null);
        const d = d1 && d1[2] ? Number(d1[2]) : (d1 ? Number(d1[1]) : null);
        if (!m || !d) return null;
        const y = m >= 4 ? Number(actualYear) : Number(actualYear) + 1; // 4月始まりの年度なので1〜3月は次のカレンダー年
        const dt = new Date(y, m - 1, d);
        return Number.isNaN(dt.getTime()) ? null : dt;
      };
      const datedEvents = (currentData.tournaments || []).map((t, idx) => ({...t, idx, parsedDate: parseEventDate(t), type: t.eventType || guessEventType(t)}));
      const today = new Date(); today.setHours(0,0,0,0);
      const todayISO = today.toISOString().slice(0,10);
      const upcomingEvents = datedEvents.filter(e => e.parsedDate && e.parsedDate >= today).sort((a,b)=>a.parsedDate-b.parsedDate);
      const nextEvent = upcomingEvents[0] || null;
      const daysToNext = nextEvent ? Math.ceil((nextEvent.parsedDate - today) / 86400000) : null;
      const currentPractices = currentData.practices[selectedGroup] || [];
      const thisWeekPractice = currentPractices[0] || {};
      const incompleteItems = [];
      (currentData.tournaments || []).forEach(t => {
        if (!t.date || /未定|確定後|随時/.test(String(t.date))) incompleteItems.push(`日程未定：${t.name}`);
        if ((t.type === '大会' || guessEventType(t) === '大会') && !t.result) incompleteItems.push(`結果未入力：${t.name}`);
        if (t.parentVisible !== false && (!t.place || !t.meeting)) incompleteItems.push(`保護者情報不足：${t.name}`);
      });
      groupList.forEach(g => {
        const r = currentData.reflections[g.id];
        if (!r || (!r.completed && !r.good && !r.bad && !r.nextAction)) incompleteItems.push(`振り返り未入力：${g.name}`);
      });
      const monthLabels = ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月'];
      const eventsByMonth = monthLabels.map(label => ({ label, events: datedEvents.filter(e => String(e.month || '').includes(label.replace('月','')) || String(e.month || '') === label) }));
      const updateTournamentExtra = (idx, field, value) => updateTournament(idx, field, value);

      // ---- 練習中モード：今日の出欠セッションを探す（無ければ「開始」ボタンで作成） ----
      const todaysSessionIdx = (currentData.sessions || []).findIndex(s => s.date === todayISO);

      // ---- 大会当日モード：デフォルトで選ぶ大会（直近予定 → 先頭） ----
      const gameDayIdx = currentData.tournaments.findIndex(t => t.id === (gameDayId || (nextEvent && nextEvent.id) || (currentData.tournaments[0] && currentData.tournaments[0].id)));
      const gameDayTournament = gameDayIdx >= 0 ? currentData.tournaments[gameDayIdx] : null;

      const themeConfig = {
        '男子': { bg: 'bg-blue-600', hover: 'hover:bg-blue-500', text: 'text-blue-500', border: 'border-blue-500', dashBg: 'from-blue-600 to-blue-800' },

        '共通': { bg: 'bg-emerald-600', hover: 'hover:bg-emerald-500', text: 'text-emerald-500', border: 'border-emerald-500', dashBg: 'from-emerald-600 to-teal-800' }
      };
      const theme = themeConfig[currentBucket];
      const completedRefs = Object.values(currentData.reflections).filter(r => r.completed).length;
      const anyPracticeReview = Object.values(currentData.reviewFlags || {}).some(f => f && f.practice);
      const anyReflectionReview = Object.values(currentData.reviewFlags || {}).some(f => f && f.reflection);
      const meta = lastMeta[currentTeam];
      const metaTime = meta && meta.updatedAt && meta.updatedAt.toDate ? meta.updatedAt.toDate().toLocaleString('ja-JP') : '';

      return (
        <div className="min-h-screen bg-gray-100 flex flex-col">
          {toast && (
            <div className="fixed top-4 right-4 z-[60] bg-slate-900 text-white text-xs font-bold px-4 py-3 rounded-lg shadow-2xl fade-in flex items-center gap-2 no-print">
              <i className="fas fa-bell text-amber-400"></i>{toast}
            </div>
          )}

          <div className={`fixed top-0 left-0 right-0 z-50 bg-slate-900 text-white shadow-xl border-b-4 ${theme.border} no-print transition-colors duration-300`}>

            <div className="max-w-7xl mx-auto px-4 pt-4 pb-3 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
