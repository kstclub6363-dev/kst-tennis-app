<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大会逆算型 年間育成管理システム ULTIMATE</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: bold; background-color: #f0fdf4; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 印刷用スタイル（印刷時に不要なUIを消す） */
    @media print {
      body { background: white; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .shadow-md, .shadow-xl, .shadow-sm { box-shadow: none !important; border: 1px solid #ccc !important; }
      main { padding-top: 0 !important; }
      .print-break-inside-avoid { break-inside: avoid; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ================= Firebase 設定 =================
    const firebaseConfig = {
      apiKey: "AIzaSyAnnaJhw_jsNlXGkDns81bY-PJyh58qkNo",
      authDomain: "kst-training-matrix.firebaseapp.com",
      projectId: "kst-training-matrix",
      storageBucket: "kst-training-matrix.firebasestorage.app",
      messagingSenderId: "152701178301",
      appId: "1:152701178301:web:906e83093ac8df9c8482d4"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ================= 定数・初期データ =================
    const GROUPS = [
      { id: 'A', name: 'グループA (4月 春季総体)' }, { id: 'B', name: 'グループB (5月 国スポ選考会)' },
      { id: 'C', name: 'グループC (6月 個人予選)' }, { id: 'D', name: 'グループD (7月 市・府大会)' },
      { id: 'E', name: 'グループE (8月 近畿・全国等)' }, { id: 'F', name: 'グループF (9-10月 秋季新人)' },
      { id: 'G', name: 'グループG (11月 府新人等)' }, { id: 'H', name: 'グループH (12月 インドア等)' },
      { id: 'I', name: 'グループI (1月 冬季強化)' }, { id: 'J', name: 'グループJ (3月 集大成)' },
      { id: '共通', name: 'グループ共通 (随時)' }
    ];
    const GENDERS = ['男子', '女子', '共通'];

    const generateEmptyData = () => {
      const plans = {}; const practices = {}; const reflections = {};
      GROUPS.forEach(g => {
        plans[g.id] = { position: '', back: '', front: '', team: '', level: '' };
        practices[g.id] = [{ id: Date.now() + Math.random(), week: '第1週', theme: '', drill: '' }];
        reflections[g.id] = { completed: false, good: '', bad: '', nextAction: '' };
      });
      return { tournaments: [], plans, practices, reflections };
    };

    const generateYearData = () => {
      const data = {};
      GENDERS.forEach(gender => {
        data[gender] = generateEmptyData();
        // 初期サンプル投入
        data[gender].tournaments = [
          { id: 'A', month: '4月', date: '未定', name: `${gender} 春季大会`, category: '団体・個人', target: '新チーム始動評価' }
        ];
      });
      return data;
    };

    const initialGlobalStore = {
      "西ノ京中学校": { "2026": generateYearData() }
    };

    const App = () => {
      const [globalStore, setGlobalStore] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      
      const [currentTeam, setCurrentTeam] = useState(() => localStorage.getItem('kst_v4_team') || "西ノ京中学校");
      const [currentYear, setCurrentYear] = useState(() => localStorage.getItem('kst_v4_year') || "2026");
      const [currentGender, setCurrentGender] = useState(() => localStorage.getItem('kst_v4_gender') || "男子");
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedGroup, setSelectedGroup] = useState('A');
      const [showSaveMessage, setShowSaveMessage] = useState(false);
      const [history, setHistory] = useState([]);

      // ================= データの読み込み =================
      useEffect(() => {
        db.collection('appData').doc('mainStore_v4').get().then((doc) => {
          if (doc.exists && doc.data().store) {
            setGlobalStore(doc.data().store);
          } else {
            setGlobalStore(initialGlobalStore);
          }
          setIsLoading(false);
        }).catch((err) => {
          console.error("読込エラー:", err);
          setGlobalStore(initialGlobalStore);
          setIsLoading(false);
        });
      }, []);

      // ================= 自動保存 =================
      useEffect(() => {
        if (isLoading || !globalStore) return;
        localStorage.setItem('kst_v4_team', currentTeam);
        localStorage.setItem('kst_v4_year', currentYear);
        localStorage.setItem('kst_v4_gender', currentGender);

        const timer = setTimeout(() => {
          db.collection('appData').doc('mainStore_v4').set({ store: globalStore })
            .then(() => {
              setShowSaveMessage(true);
              setTimeout(() => setShowSaveMessage(false), 1500);
            }).catch(console.error);
        }, 1500);
        return () => clearTimeout(timer);
      }, [globalStore, isLoading, currentTeam, currentYear, currentGender]);

      if (isLoading) {
        return <div className="flex flex-col justify-center items-center h-screen bg-slate-900 text-white"><div className="loader mb-4"></div><p className="font-bold">同期中...</p></div>;
      }

      // --- 安全なデータ参照 (チーム > 年度 > 男女) ---
      const teamData = globalStore[currentTeam] || { "2026": generateYearData() };
      const availableYears = Object.keys(teamData).sort();
      const actualYear = availableYears.includes(currentYear) ? currentYear : availableYears[0];
      
      // 年度データの中に男女の構造がない（旧データ）場合のパッチ処理
      let yearData = teamData[actualYear];
      if (!yearData["男子"]) yearData = generateYearData(); 
      
      const currentData = yearData[currentGender];

      // ================= アクション関数 =================
      const updateStore = (updater) => {
        setHistory(prev => [...prev.slice(-9), globalStore]);
        setGlobalStore(prev => {
          const newData = updater(prev[currentTeam][actualYear][currentGender]);
          return {
            ...prev,
            [currentTeam]: {
              ...prev[currentTeam],
              [actualYear]: {
                ...prev[currentTeam][actualYear],
                [currentGender]: newData
              }
            }
          };
        });
      };

      const handleUndo = () => {
        if (history.length === 0) return;
        setGlobalStore(history[history.length - 1]);
        setHistory(prev => prev.slice(0, -1));
      };

      const handleAddTeam = () => {
        const teamName = prompt('新規チーム名を入力:');
        if (teamName && !globalStore[teamName]) {
          setHistory(prev => [...prev, globalStore]);
          setGlobalStore(prev => ({ ...prev, [teamName]: { "2026": generateYearData() } }));
          setCurrentTeam(teamName); setCurrentYear("2026");
        }
      };

      const handleAddYear = () => {
        const nextYear = String(Number(actualYear) + 1);
        if (window.confirm(`${nextYear}年度を作成しますか？`)) {
          setHistory(prev => [...prev, globalStore]);
          const newData = generateYearData();
          // ノウハウだけ引き継ぐ処理
          GENDERS.forEach(gen => {
            newData[gen].plans = teamData[actualYear][gen].plans;
            newData[gen].practices = teamData[actualYear][gen].practices;
          });
          setGlobalStore(prev => ({ ...prev, [currentTeam]: { ...prev[currentTeam], [nextYear]: newData } }));
          setCurrentYear(nextYear);
        }
      };

      const handleExport = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(globalStore));
        const a = document.createElement('a');
        a.setAttribute("href", dataStr);
        a.setAttribute("download", `kst_backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(a); a.click(); a.remove();
      };

      const handlePrint = () => { window.print(); };

      // ================= 各種更新 =================
      const updateTournament = (idx, field, value) => updateStore(d => { const arr = [...d.tournaments]; arr[idx][field] = value; return {...d, tournaments: arr}; });
      const addTournament = () => updateStore(d => ({...d, tournaments: [...d.tournaments, {id: selectedGroup, month:'未定', date:'未定', name:'新規大会', category:'', target:''}]}));
      const deleteTournament = (idx) => { if(window.confirm('削除しますか？')) updateStore(d => ({...d, tournaments: d.tournaments.filter((_, i) => i !== idx)})); };
      
      const updatePlan = (field, value) => updateStore(d => ({...d, plans: {...d.plans, [selectedGroup]: {...d.plans[selectedGroup], [field]: value}}}));
      
      const updatePractice = (idx, field, value) => updateStore(d => { const arr = [...d.practices[selectedGroup]]; arr[idx][field] = value; return {...d, practices: {...d.practices, [selectedGroup]: arr}}; });
      const addPractice = () => updateStore(d => { const arr = d.practices[selectedGroup] || []; return {...d, practices: {...d.practices, [selectedGroup]: [...arr, {id: Date.now(), week:`第${arr.length+1}週`, theme:'', drill:''}]}}; });
      const deletePractice = (idx) => { if(window.confirm('削除しますか？')) updateStore(d => ({...d, practices: {...d.practices, [selectedGroup]: d.practices[selectedGroup].filter((_, i) => i !== idx)}})); };
      
      const updateReflection = (field, value) => updateStore(d => ({...d, reflections: {...d.reflections, [selectedGroup]: {...d.reflections[selectedGroup], [field]: value}}}));

      // ダッシュボード用集計
      const completedRefs = Object.values(currentData.reflections).filter(r => r.completed).length;

      return (
        <div className="min-h-screen bg-gray-100 flex flex-col">
          
          {/* ================= ヘッダー (印刷時は非表示) ================= */}
          <div className="fixed top-0 left-0 right-0 z-50 bg-slate-900 text-white shadow-xl border-b-4 border-emerald-500 no-print">
            
            {/* 上段：タイトルとコントロール */}
            <div className="max-w-7xl mx-auto px-4 pt-4 pb-3 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="bg-emerald-500 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase">Cloud Sync <i className="fas fa-cloud ml-1"></i></span>
                  <span className={`text-[10px] text-emerald-400 font-bold transition-opacity duration-300 ${showSaveMessage ? 'opacity-100' : 'opacity-0'}`}><i className="fas fa-check mr-1"></i>保存完了</span>
                </div>
                <h1 className="text-xl md:text-2xl font-black text-white tracking-tight">年間育成管理システム</h1>
              </div>
              
              <div className="flex flex-wrap items-center gap-2 bg-slate-800 p-2 rounded-lg border border-slate-700 w-full lg:w-auto">
                <button onClick={handleUndo} disabled={history.length === 0} className={`text-xs font-bold px-3 py-1.5 rounded flex items-center gap-1 border ${history.length === 0 ? 'bg-slate-700 text-slate-500 border-slate-600' : 'bg-slate-700 hover:bg-slate-600 text-white border-slate-500'}`}><i className="fas fa-undo-alt"></i></button>
                <button onClick={handlePrint} className="bg-slate-700 hover:bg-slate-600 text-white border border-slate-500 text-xs font-bold px-3 py-1.5 rounded" title="印刷"><i className="fas fa-print"></i></button>
                <div className="h-6 w-px bg-slate-600 mx-1"></div>
                <select className="bg-slate-900 text-white border border-slate-600 font-bold text-sm p-1.5 rounded max-w-[120px] truncate" value={currentTeam} onChange={(e) => setCurrentTeam(e.target.value)}>
                  {Object.keys(globalStore).map(team => <option key={team} value={team}>{team}</option>)}
                </select>
                <button onClick={handleAddTeam} className="bg-slate-700 hover:bg-slate-600 text-white font-bold px-2 py-1.5 rounded text-xs border border-slate-500"><i className="fas fa-plus"></i></button>
                <div className="flex items-center gap-1 ml-auto lg:ml-2">
                  <select className="bg-slate-900 text-emerald-400 border border-slate-600 font-bold text-sm p-1.5 rounded" value={actualYear} onChange={(e) => setCurrentYear(e.target.value)}>
                    {availableYears.map(y => <option key={y} value={y}>{y}年度</option>)}
                  </select>
                  <button onClick={handleAddYear} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-2 py-1.5 rounded text-xs"><i className="fas fa-angle-double-right"></i></button>
                </div>
              </div>
            </div>

            {/* 下段：男女切り替え ＆ タブナビゲーション */}
            <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row border-t border-slate-800 bg-slate-900">
              
              {/* 【NEW】 男女トグル */}
              <div className="flex items-center gap-1 py-2 md:pr-4 md:border-r border-slate-700">
                {GENDERS.map(gen => (
                  <button key={gen} onClick={() => setCurrentGender(gen)} className={`px-4 py-1.5 rounded-full text-xs font-black transition-all border ${currentGender === gen ? 'bg-blue-500 text-white border-blue-400 shadow-md' : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700'}`}>
                    {gen === '男子' && <i className="fas fa-mars mr-1"></i>}
                    {gen === '女子' && <i className="fas fa-venus mr-1"></i>}
                    {gen}
                  </button>
                ))}
              </div>

              {/* メインタブ */}
              <div className="flex overflow-x-auto whitespace-nowrap scrollbar-hide flex-grow">
                <button className={`py-3 px-5 text-xs font-black tracking-wide border-b-2 transition-all ${activeTab === 'dashboard' ? 'border-amber-400 text-amber-400 bg-slate-800' : 'border-transparent text-slate-400 hover:text-white'}`} onClick={() => setActiveTab('dashboard')}><i className="fas fa-home mr-1.5"></i>HOME</button>
                <button className={`py-3 px-5 text-xs font-black tracking-wide border-b-2 transition-all ${activeTab === 'calendar' ? 'border-emerald-400 text-emerald-400 bg-slate-800' : 'border-transparent text-slate-400 hover:text-white'}`} onClick={() => setActiveTab('calendar')}><i className="fas fa-calendar-alt mr-1.5"></i>カレンダー</button>
                <button className={`py-3 px-5 text-xs font-black tracking-wide border-b-2 transition-all ${activeTab === 'plan' ? 'border-emerald-400 text-emerald-400 bg-slate-800' : 'border-transparent text-slate-400 hover:text-white'}`} onClick={() => setActiveTab('plan')}><i className="fas fa-bullseye mr-1.5"></i>育成計画</button>
                <button className={`py-3 px-5 text-xs font-black tracking-wide border-b-2 transition-all ${activeTab === 'practice' ? 'border-blue-400 text-blue-400 bg-slate-800' : 'border-transparent text-slate-400 hover:text-white'}`} onClick={() => setActiveTab('practice')}><i className="fas fa-walking mr-1.5"></i>練習メニュー</button>
                <button className={`py-3 px-5 text-xs font-black tracking-wide border-b-2 transition-all ${activeTab === 'reflection' ? 'border-rose-400 text-rose-400 bg-slate-800' : 'border-transparent text-slate-400 hover:text-white'}`} onClick={() => setActiveTab('reflection')}><i className="fas fa-sync-alt mr-1.5"></i>振り返り</button>
              </div>
            </div>
          </div>

          {/* ================= メインコンテンツ ================= */}
          <main className="flex-grow max-w-7xl w-full mx-auto p-4 pt-52 md:pt-40 pb-12">
            
            {/* 印刷用ヘッダー（通常時は非表示） */}
            <div className="hidden print-only mb-6 text-center border-b-2 border-gray-800 pb-4">
              <h1 className="text-2xl font-black">【{currentTeam}】 {actualYear}年度 {currentGender}チーム 年間育成システム</h1>
            </div>

            {/* グループセレクター */}
            {['plan', 'practice', 'reflection'].includes(activeTab) && (
              <div className="mb-4 bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-3 border-l-4 border-l-emerald-500 no-print">
                <div className="flex items-center gap-2 w-full sm:w-auto">
                  <span className="text-xs font-black text-gray-600 whitespace-nowrap">編集対象グループ:</span>
                  <select className="w-full sm:w-auto border border-gray-300 font-bold text-sm p-1.5 rounded bg-gray-50 text-gray-800 focus:ring-2 focus:ring-emerald-400" value={selectedGroup} onChange={(e) => setSelectedGroup(e.target.value)}>
                    {GROUPS.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                  </select>
                </div>
              </div>
            )}

            {/* ================= TAB 0: ダッシュボード ================= */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6 animate-fade-in">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  
                  {/* ステータスカード */}
                  <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl p-5 text-white shadow-md">
                    <div className="text-blue-200 text-xs font-bold mb-1">現在のコンテキスト</div>
                    <div className="text-2xl font-black mb-4">{currentTeam} <br/><span className="text-lg text-blue-300">{actualYear}年度 ({currentGender})</span></div>
                    <div className="flex items-center justify-between border-t border-blue-500/50 pt-3">
                      <span className="text-xs font-bold">登録大会数</span>
                      <span className="text-xl font-bold">{currentData.tournaments.length}</span>
                    </div>
                  </div>

                  <div className="bg-white rounded-xl p-5 border border-gray-200 shadow-md">
                    <div className="text-gray-500 text-xs font-bold mb-3 flex items-center"><i className="fas fa-tasks mr-2 text-rose-500"></i>振り返り進捗 (PDCA)</div>
                    <div className="flex items-end gap-2 mb-2">
                      <span className="text-3xl font-black text-gray-800">{completedRefs}</span>
                      <span className="text-sm font-bold text-gray-400 mb-1">/ 11 グループ</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2 mb-1">
                      <div className="bg-rose-500 h-2 rounded-full" style={{width: `${(completedRefs/11)*100}%`}}></div>
                    </div>
                    <p className="text-[10px] text-gray-400">※大会終了後は必ず「振り返り」タブで評価を完了させてください。</p>
                  </div>

                  <div className="bg-white rounded-xl p-5 border border-gray-200 shadow-md flex flex-col justify-center items-center text-center">
                    <i className="fas fa-database text-3xl text-gray-300 mb-2"></i>
                    <h3 className="font-bold text-gray-700 text-sm mb-1">データバックアップ</h3>
                    <p className="text-[10px] text-gray-500 mb-3">現在の全データをJSON形式でPCに保存します。</p>
                    <button onClick={handleExport} className="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold px-4 py-2 rounded-lg shadow transition-colors w-full"><i className="fas fa-download mr-1"></i> バックアップをダウンロード</button>
                  </div>

                </div>

                <div className="bg-white rounded-xl p-5 border border-gray-200 shadow-md">
                  <h3 className="font-bold text-gray-800 border-b pb-2 mb-4"><i className="fas fa-flag text-emerald-500 mr-2"></i>登録済み 大会スケジュールハイライト</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                    {currentData.tournaments.slice(0, 6).map((t, i) => (
                      <div key={i} className="border border-gray-100 bg-gray-50 rounded-lg p-3">
                        <div className="flex justify-between items-center mb-1">
                          <span className="text-xs font-black text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded">{t.month}</span>
                          <span className="text-[10px] font-bold text-gray-400">{t.date}</span>
                        </div>
                        <div className="font-bold text-sm text-gray-800 truncate" title={t.name}>{t.name}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ================= TAB ①: カレンダー ================= */}
            {activeTab === 'calendar' && (
              <div className="bg-white p-4 rounded-xl shadow-md space-y-4">
                <div className="flex justify-between items-center border-b pb-3 border-gray-100 no-print">
                  <h2 className="text-lg font-bold text-gray-800">大会スケジュール（{currentGender}）</h2>
                  <div className="flex gap-2">
                    <select className="border text-xs font-bold p-1 rounded bg-gray-50" value={selectedGroup} onChange={(e)=>setSelectedGroup(e.target.value)}>
                      {GROUPS.map(g => <option key={g.id} value={g.id}>追加先: {g.id}</option>)}
                    </select>
                    <button onClick={addTournament} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs px-3 py-1.5 rounded"><i className="fas fa-plus mr-1"></i>大会追加</button>
                  </div>
                </div>
                <div className="overflow-x-auto print-break-inside-avoid">
                  <table className="w-full text-left border-collapse min-w-[900px]">
                    <thead>
                      <tr className="bg-gray-50 text-gray-600 text-xs font-bold border-b">
                        <th className="p-2 w-16 text-center">Grp</th>
                        <th className="p-2 w-20">開催月</th>
                        <th className="p-2 w-28 text-center">日程</th>
                        <th className="p-2 w-72">大会名 / カテゴリ</th>
                        <th className="p-2">位置付け</th>
                        <th className="p-2 w-10 text-center no-print">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100 text-xs">
                      {currentData.tournaments.map((t, idx) => (
                        <tr key={idx} className="hover:bg-emerald-50/30">
                          <td className="p-2 text-center"><select className="border rounded p-1 font-bold text-center bg-transparent w-full" value={t.id} onChange={(e) => updateTournament(idx, 'id', e.target.value)}>{GROUPS.map(g => <option key={g.id} value={g.id}>{g.id}</option>)}</select></td>
                          <td className="p-2"><input type="text" className="border rounded p-1 w-full font-bold text-center bg-transparent" value={t.month} onChange={(e) => updateTournament(idx, 'month', e.target.value)}/></td>
                          <td className="p-2"><input type="text" className="border rounded p-1 w-full font-mono text-center font-bold bg-transparent" value={t.date} onChange={(e) => updateTournament(idx, 'date', e.target.value)}/></td>
                          <td className="p-2 space-y-1">
                            <input type="text" className="border rounded p-1 w-full font-bold bg-transparent" value={t.name} onChange={(e) => updateTournament(idx, 'name', e.target.value)}/>
                            <input type="text" className="border-none p-0.5 w-full text-[10px] text-gray-500 bg-transparent" value={t.category} onChange={(e) => updateTournament(idx, 'category', e.target.value)} placeholder="カテゴリ"/>
                          </td>
                          <td className="p-2"><textarea className="border rounded p-1 w-full h-12 text-gray-600 resize-none bg-transparent" value={t.target} onChange={(e) => updateTournament(idx, 'target', e.target.value)}/></td>
                          <td className="p-2 text-center no-print"><button onClick={() => deleteTournament(idx)} className="text-gray-400 hover:text-red-500"><i className="fas fa-trash-alt"></i></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ================= TAB ②: 育成計画 ================= */}
            {activeTab === 'plan' && currentData.plans[selectedGroup] && (
              <div className="space-y-4 animate-fade-in print-break-inside-avoid">
                <div className="bg-white border-t-4 border-emerald-500 p-4 rounded-xl shadow-sm">
                  <label className="text-[10px] text-gray-500 font-bold block mb-1 uppercase tracking-wider">フェーズの位置付け・狙い ({currentGender})</label>
                  <textarea className="w-full bg-gray-50 border border-gray-200 rounded p-2 text-xs font-bold text-gray-800 leading-relaxed h-12 bg-transparent" value={currentData.plans[selectedGroup].position} onChange={(e)=>updatePlan('position', e.target.value)}/>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm"><div className="font-bold text-blue-800 text-xs flex items-center gap-1.5 border-b pb-1.5 mb-1"><i className="fas fa-baseball-ball text-blue-500"></i> 後衛: 技術・配球</div><textarea className="w-full h-40 border-none bg-gray-50 rounded p-2 text-xs leading-relaxed resize-none bg-transparent" value={currentData.plans[selectedGroup].back} onChange={(e)=>updatePlan('back', e.target.value)}/></div>
                  <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm"><div className="font-bold text-red-800 text-xs flex items-center gap-1.5 border-b pb-1.5 mb-1"><i className="fas fa-user-shield text-red-500"></i> 前衛: 技術・動き</div><textarea className="w-full h-40 border-none bg-gray-50 rounded p-2 text-xs leading-relaxed resize-none bg-transparent" value={currentData.plans[selectedGroup].front} onChange={(e)=>updatePlan('front', e.target.value)}/></div>
                  <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm"><div className="font-bold text-purple-800 text-xs flex items-center gap-1.5 border-b pb-1.5 mb-1"><i className="fas fa-users text-purple-500"></i> チーム: 規律・マナー</div><textarea className="w-full h-40 border-none bg-gray-50 rounded p-2 text-xs leading-relaxed resize-none bg-transparent" value={currentData.plans[selectedGroup].team} onChange={(e)=>updatePlan('team', e.target.value)}/></div>
                  <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm"><div className="font-bold text-amber-800 text-xs flex items-center gap-1.5 border-b pb-1.5 mb-1"><i className="fas fa-layer-group text-amber-500"></i> 学年別・習熟度別配慮</div><textarea className="w-full h-40 border-none bg-gray-50 rounded p-2 text-xs leading-relaxed resize-none bg-transparent" value={currentData.plans[selectedGroup].level} onChange={(e)=>updatePlan('level', e.target.value)}/></div>
                </div>
              </div>
            )}

            {/* ================= TAB ③: 練習メニュー ================= */}
            {activeTab === 'practice' && currentData.practices[selectedGroup] && (
              <div className="space-y-4 animate-fade-in print-break-inside-avoid">
                <div className="flex justify-end mb-2 no-print">
                  <button onClick={addPractice} className="bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs px-3 py-2 rounded shadow transition-all"><i className="fas fa-plus mr-1"></i>練習枠を追加</button>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                  {currentData.practices[selectedGroup].map((p, idx) => (
                    <div key={p.id} className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden flex flex-col relative group print-break-inside-avoid">
                      <div className="bg-gray-100 px-3 py-2 border-b flex justify-between items-center">
                        <input type="text" className="bg-transparent font-black text-gray-600 text-xs w-24" value={p.week} onChange={(e)=>updatePractice(idx, 'week', e.target.value)}/>
                        <button onClick={() => deletePractice(idx)} className="text-gray-400 hover:text-red-500 p-1 opacity-0 group-hover:opacity-100 transition-opacity no-print"><i className="fas fa-times"></i></button>
                      </div>
                      <div className="p-3 flex-grow space-y-3 text-xs">
                        <div><label className="text-[10px] font-bold text-gray-400 block mb-1">週間重点テーマ</label><input type="text" className="w-full border border-gray-200 font-bold rounded p-1.5 text-blue-900 bg-gray-50 bg-transparent" value={p.theme} onChange={(e)=>updatePractice(idx, 'theme', e.target.value)}/></div>
                        <div><label className="text-[10px] font-bold text-gray-400 block mb-1">練習ドリル・配球内容</label><textarea className="w-full border border-gray-200 rounded p-1.5 h-32 text-gray-700 bg-gray-50 resize-none bg-transparent" value={p.drill} onChange={(e)=>updatePractice(idx, 'drill', e.target.value)}/></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ================= TAB ④: 振り返り ================= */}
            {activeTab === 'reflection' && currentData.reflections[selectedGroup] && (
              <div className="space-y-4 animate-fade-in print-break-inside-avoid">
                <div className="flex justify-between items-center bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                  <h2 className="text-sm font-bold text-rose-900"><i className="fas fa-sync-alt mr-1.5"></i>大会後 振り返り ({currentGender})</h2>
                  <label className={`flex items-center space-x-2 text-xs font-bold cursor-pointer border px-3 py-1.5 rounded-lg transition-colors ${currentData.reflections[selectedGroup].completed ? 'bg-rose-50 border-rose-300 text-rose-600' : 'bg-white border-gray-300 text-gray-400'}`}>
                    <input type="checkbox" checked={currentData.reflections[selectedGroup].completed} onChange={(e) => updateReflection('completed', e.target.checked)} className="form-checkbox text-rose-500 rounded w-4 h-4"/>
                    <span>振り返り完了済</span>
                  </label>
                </div>
                <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm space-y-4 text-xs">
                  <div><label className="block text-sm font-bold text-emerald-700 mb-1"><i className="fas fa-thumbs-up"></i> 成果（機能した技術・戦術）</label><textarea value={currentData.reflections[selectedGroup].good} onChange={(e) => updateReflection('good', e.target.value)} className="w-full border-none bg-emerald-50 rounded p-3 min-h-[90px] leading-relaxed resize-none bg-transparent"></textarea></div>
                  <div><label className="block text-sm font-bold text-rose-700 mb-1"><i className="fas fa-exclamation-triangle"></i> 課題（修正が必要な点）</label><textarea value={currentData.reflections[selectedGroup].bad} onChange={(e) => updateReflection('bad', e.target.value)} className="w-full border-none bg-rose-50 rounded p-3 min-h-[90px] leading-relaxed resize-none bg-transparent"></textarea></div>
                  <div className="pt-2 border-t border-gray-100"><label className="block text-sm font-bold text-blue-700 mb-1"><i className="fas fa-long-arrow-alt-right"></i> 次の練習メニューへの引継ぎ</label><textarea value={currentData.reflections[selectedGroup].nextAction} onChange={(e) => updateReflection('nextAction', e.target.value)} className="w-full border-none bg-blue-50 rounded p-3 min-h-[90px] leading-relaxed resize-none bg-transparent"></textarea></div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
